<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Baba Rock - Playlist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        :root {
            --primary-color: #ff4500;
            --bg-dark: #0c0c0c;
            --card-bg: #121212;
            --item-bg: #1a1a1a;
            --border-color: #282828;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
        }

        .playlist-card {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .header-top h1 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .header-top h1 i { color: var(--primary-color); }

        .btn-save-order {
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-save-order:active { transform: scale(0.97); }
        .btn-save-order:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }

        .sub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222222;
        }

        .song-count {
            font-size: 0.8rem;
            color: #888888;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .drag-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .song-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .song-item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 10px;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        /* Active selection styling (Red frame effect) */
        .song-item-card.active-selected {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.35);
            background-color: #221512;
        }

        .song-item-card.dragging {
            opacity: 0.5;
            background: #252525;
            border: 1px dashed var(--primary-color);
        }

        .drag-handle {
            color: #555555;
            margin-right: 12px;
            font-size: 1rem;
            cursor: grab;
            padding: 6px 4px;
            touch-action: none;
            flex-shrink: 0;
        }

        .song-left {
            display: flex;
            align-items: center;
            min-width: 0;
            flex-grow: 1;
            cursor: pointer;
        }

        .song-number {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
            width: 26px;
            flex-shrink: 0;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex-grow: 1;
        }

        .song-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .key-badge {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary-color);
            background: #121212;
            border: 1px solid var(--primary-color);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-action-icon {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .btn-action-icon:hover { color: var(--text-main); }
        .yt-icon { color: #ff0000; font-size: 1.1rem; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-color);
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 360px;
        }

        .modal-title { font-size: 1rem; margin-bottom: 8px; color: var(--text-main); }
        .modal-song-name { font-size: 0.85rem; color: var(--primary-color); margin-bottom: 16px; word-break: break-all; }
        
        .modal-input {
            width: 100%;
            padding: 10px;
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-input:focus { border-color: var(--primary-color); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        
        .btn-cancel, .btn-save {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }

        .btn-cancel { background: var(--border-color); color: #cccccc; }
        .btn-save { background: var(--primary-color); color: #ffffff; }
    </style>
</head>
<body>

    <div class="playlist-card">
        <div class="header-top">
            <h1><i class="fa-solid fa-music"></i> Playlist</h1>
            <button class="btn-save-order" id="saveOrderBtn" onclick="savePlaylistOrder()">
                <i class="fa-solid fa-floppy-disk"></i> Save Order
            </button>
        </div>

        <div class="sub-header">
            <span class="drag-hint"><i class="fa-solid fa-grip-vertical"></i> Drag handle to reorder</span>
            <span class="song-count" id="songCount">Loading...</span>
        </div>

        <ul class="song-list" id="songList"></ul>
    </div>

    <!-- Key Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <div class="modal-title">Edit Song Key</div>
            <div class="modal-song-name" id="modalSongName"></div>
            <input type="text" class="modal-input" id="modalKeyInput" placeholder="e.g. Am, Em, F#m" />
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="saveBtn" onclick="submitKeyUpdate()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyrIg2w1eHU2fruqixpNKLCtvTtgZ1N4inHOx5g8z_DiAR8W9NiZkK0Cf0D106HHyrp/exec";
        
        let playlistData = [];
        let keyMapData = {};
        let activeEditSong = null;
        let activeDragNode = null;
        let clickTimer = null;

        function normalizeTitle(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        }

        function slugify(str) {
            return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        }

        async function openTxtFileInNewTab(txtPath) {
            try {
                const response = await fetch(txtPath);
                if (!response.ok) throw new Error("File not found");
                const text = await response.text();

                const newWindow = window.open("", "_blank");
                if (newWindow) {
                    newWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Song View</title>
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <style>
                                body {
                                    background-color: #0c0c0c;
                                    color: #ffffff;
                                    font-family: monospace;
                                    font-size: 1.8em;
                                    padding: 20px;
                                    white-space: pre-wrap;
                                    word-wrap: break-word;
                                    line-height: 1.4;
                                }
                            </style>
                        </head>
                        <body>${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</body>
                        </html>
                    `);
                    newWindow.document.close();
                }
            } catch (err) {
                window.open(txtPath, "_blank");
            }
        }

        async function loadPlaylist() {
            const countElement = document.getElementById("songCount");

            try {
                const timestamp = new Date().getTime();
                const [resPlaylist, resKeys] = await Promise.all([
                    fetch(`./playlist.json?t=${timestamp}`),
                    fetch(`${GOOGLE_SHEET_API_URL}?t=${timestamp}`, { redirect: 'follow' })
                ]);

                playlistData = await resPlaylist.json();
                keyMapData = await resKeys.json();

                renderUI();
            } catch (err) {
                console.error(err);
                countElement.textContent = "Error";
            }
        }

        function renderUI() {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");

            const normalizedKeyMap = {};
            for (const [title, key] of Object.entries(keyMapData)) {
                normalizedKeyMap[normalizeTitle(title)] = key;
            }

            listElement.innerHTML = "";
            countElement.textContent = `${playlistData.length} Songs`;

            playlistData.forEach((item, index) => {
                const li = document.createElement("li");
                const query = encodeURIComponent(`${item.title} ${item.artist}`);
                const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;
                
                const txtPath = item.file 
                    ? `./${item.file}` 
                    : `./songs/${slugify(item.artist)}-${slugify(item.title)}.txt`;
                
                const normTitle = normalizeTitle(item.title);
                const detectedKey = normalizedKeyMap[normTitle] || item.key || null;
                const keyBadgeHtml = (detectedKey && detectedKey !== 'N/A') 
                    ? `<span class="key-badge">${detectedKey}</span>` 
                    : '';

                li.className = "song-item-card";
                li.dataset.index = index;

                li.innerHTML = `
                    <i class="fa-solid fa-grip-vertical drag-handle"></i>
                    <div class="song-left">
                        <span class="song-number">${index + 1}</span>
                        <div class="song-info">
                            <span class="song-title">${item.title}</span>
                            <span class="song-artist">${item.artist}</span>
                        </div>
                    </div>
                    <div class="actions-right">
                        ${keyBadgeHtml}
                        <button class="btn-action-icon yt-btn" title="YouTube"><i class="fa-brands fa-youtube yt-icon"></i></button>
                    </div>
                `;

                const songLeft = li.querySelector('.song-left');

                // Single Click Handler: Highlight Red Frame & Open Document
                songLeft.onclick = () => {
                    // Remove red active frame from all items
                    document.querySelectorAll('.song-item-card').forEach(el => el.classList.remove('active-selected'));
                    // Add red active frame to current selected card
                    li.classList.add('active-selected');

                    if (clickTimer) clearTimeout(clickTimer);
                    clickTimer = setTimeout(() => {
                        openTxtFileInNewTab(txtPath);
                    }, 250);
                };

                // Double Click Handler: Open Key Editing Modal
                songLeft.ondblclick = () => {
                    if (clickTimer) clearTimeout(clickTimer);
                    openModal(item, detectedKey);
                };

                // YouTube Action
                li.querySelector('.yt-btn').onclick = (e) => {
                    e.stopPropagation();
                    window.open(youtubeUrl, '_blank', 'noopener,noreferrer');
                };

                // Drag & Drop Handlers
                attachDragAndDropHandlers(li);

                listElement.appendChild(li);
            });
        }

        /* --- Cross-Platform Drag & Drop Handler --- */
        function attachDragAndDropHandlers(li) {
            const handle = li.querySelector('.drag-handle');

            handle.addEventListener('touchstart', (e) => {
                activeDragNode = li;
                li.classList.add('dragging');
            }, { passive: true });

            handle.addEventListener('touchmove', (e) => {
                if (!activeDragNode) return;

                const touchLocation = e.touches[0];
                const targetElement = document.elementFromPoint(touchLocation.clientX, touchLocation.clientY);
                const targetCard = targetElement ? targetElement.closest('.song-item-card') : null;

                if (targetCard && targetCard !== activeDragNode) {
                    const list = document.getElementById("songList");
                    const cards = Array.from(list.children);
                    const activeIndex = cards.indexOf(activeDragNode);
                    const targetIndex = cards.indexOf(targetCard);

                    if (activeIndex < targetIndex) {
                        list.insertBefore(activeDragNode, targetCard.nextSibling);
                    } else {
                        list.insertBefore(activeDragNode, targetCard);
                    }
                    updateSequenceNumbers();
                }
            }, { passive: true });

            handle.addEventListener('touchend', () => endDrag());

            li.draggable = true;
            li.addEventListener('dragstart', (e) => {
                activeDragNode = li;
                li.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            li.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!activeDragNode || activeDragNode === li) return;

                const list = document.getElementById("songList");
                const cards = Array.from(list.children);
                const activeIndex = cards.indexOf(activeDragNode);
                const targetIndex = cards.indexOf(li);

                if (activeIndex < targetIndex) {
                    list.insertBefore(activeDragNode, li.nextSibling);
                } else {
                    list.insertBefore(activeDragNode, li);
                }
                updateSequenceNumbers();
            });

            li.addEventListener('dragend', () => endDrag());
        }

        function endDrag() {
            if (activeDragNode) {
                activeDragNode.classList.remove('dragging');
                activeDragNode = null;
                resyncInternalDataArray();
            }
        }

        function updateSequenceNumbers() {
            const cards = document.querySelectorAll('.song-item-card');
            cards.forEach((card, idx) => {
                card.querySelector('.song-number').textContent = idx + 1;
            });
        }

        function resyncInternalDataArray() {
            const list = document.getElementById("songList");
            const newOrder = [];
            
            Array.from(list.children).forEach(card => {
                const title = card.querySelector('.song-title').textContent;
                const artist = card.querySelector('.song-artist').textContent;
                const foundItem = playlistData.find(p => p.title === title && p.artist === artist);
                if (foundItem) newOrder.push(foundItem);
            });

            playlistData = newOrder;
        }

        /* --- Save Order Functionality --- */
        async function savePlaylistOrder() {
            const btn = document.getElementById("saveOrderBtn");
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`;

            try {
                const response = await fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: "save_order",
                        playlist: playlistData
                    }),
                    redirect: 'follow'
                });

                btn.innerHTML = `<i class="fa-solid fa-check"></i> Saved!`;
            } catch (err) {
                console.error("Failed to save order:", err);
                alert("Error saving playlist order.");
                btn.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Error`;
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Save Order`;
                }, 2000);
            }
        }

        /* --- Modal Operations --- */
        function openModal(item, currentKey) {
            activeEditSong = item;
            document.getElementById("modalSongName").textContent = `${item.title} - ${item.artist}`;
            document.getElementById("modalKeyInput").value = currentKey && currentKey !== 'N/A' ? currentKey : '';
            document.getElementById("editModal").style.display = "flex";
            document.getElementById("modalKeyInput").focus();
        }

        function closeModal() {
            document.getElementById("editModal").style.display = "none";
            activeEditSong = null;
        }

        async function submitKeyUpdate() {
            if (!activeEditSong) return;

            const newKey = document.getElementById("modalKeyInput").value.trim();
            const saveBtn = document.getElementById("saveBtn");
            
            saveBtn.disabled = true;
            saveBtn.textContent = "Saving...";

            try {
                const response = await fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        song: activeEditSong.title,
                        key: newKey || 'N/A'
                    }),
                    redirect: 'follow'
                });

                keyMapData[activeEditSong.title] = newKey;
                renderUI();
                closeModal();
            } catch (err) {
                console.error("Save failed:", err);
                alert("Network error. Key could not be saved.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "Save";
            }
        }

        document.getElementById("modalKeyInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") submitKeyUpdate();
        });

        loadPlaylist();
    </script>
</body>
</html>
