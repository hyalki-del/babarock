<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock</title>
    <!-- Font Awesome for crisp icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset & Dark Metal Theme Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container Card - Strict Single Column Constraints */
        .welcome-card {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: #121212;
            padding: 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        /* Logo Configuration */
        .logo-container {
            margin-bottom: 35px;
        }

        .logo-img {
            max-width: 260px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: inline-block;
        }

        /* Interactive Navigation Setup */
        .navigation-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #1a1a1a;
            border: 2px solid #282828;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .action-button i {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 28px;
            text-align: center;
            color: #ff4500; /* Fiery Orange Accent */
        }

        /* Hover states */
        .action-button:hover {
            color: #ffffff;
            background: #222222;
            border-color: #ff4500;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 68, 0, 0.15);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <!-- Top Logo using GitHub Pages distribution link -->
        <div class="logo-container">
            <img src="https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg" alt="Baba Rock Logo" class="logo-img">
        </div>

        <!-- Links Grid Layout -->
        <nav class="navigation-list">
            <!-- Calendar Navigation -->
            <a href="https://hyalki-del.github.io/babarock/takvim.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Takvim</span>
            </a>

            <!-- Playlist Navigation -->
            <a href="https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-music"></i>
                <span>Playlist</span>
            </a>
        </nav>
    </div>

</body>
</html>
