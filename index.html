<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Reset & Dark Metal Theme Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container Card */
        .welcome-card {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: #121212;
            padding: 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        /* Logo Configuration */
        .logo-container {
            margin-bottom: 35px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-img {
            max-width: 260px;
            max-height: 280px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            display: block;
        }

        /* Voltage Drop / Light Bulb Buzzing Flicker Animation */
        @keyframes bulbFlicker {
            0%   { opacity: 1;   filter: brightness(1);   transform: scale(1); }
            10%  { opacity: 0.3; filter: brightness(0.4); transform: scale(0.99); }
            20%  { opacity: 0.8; filter: brightness(1.1); transform: scale(1.01); }
            35%  { opacity: 0.1; filter: brightness(0.2); transform: scale(0.98); } /* Deepest voltage drop */
            50%  { opacity: 0.6; filter: brightness(0.7); transform: scale(1); }
            65%  { opacity: 0.2; filter: brightness(0.3); transform: scale(0.99); }
            80%  { opacity: 0.9; filter: brightness(1.2); transform: scale(1.01); }
            100% { opacity: 1;   filter: brightness(1);   transform: scale(1); }
        }

        .bulb-buzz {
            animation: bulbFlicker 0.45s ease-in-out;
        }

        /* Interactive Navigation Setup */
        .navigation-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #1a1a1a;
            border: 2px solid #282828;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .action-button i {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 28px;
            text-align: center;
            color: #ff4500;
        }

        .action-button:hover {
            color: #ffffff;
            background: #222222;
            border-color: #ff4500;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 68, 0, 0.15);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <!-- Top Logo Container -->
        <div class="logo-container">
            <img id="randomLogo" src="https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg" alt="Baba Rock Logo" class="logo-img">
        </div>

        <!-- Navigation Links -->
        <nav class="navigation-list">
            <a href="https://hyalki-del.github.io/babarock/takvim.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Takvim</span>
            </a>

            <a href="https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-music"></i>
                <span>Playlist</span>
            </a>
        </nav>
    </div>

    <script>
        const images = [
            "https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg",
            "https://hyalki-del.github.io/babarock/b1.jpg",
            "https://hyalki-del.github.io/babarock/b2.jpg",
            "https://hyalki-del.github.io/babarock/b3.jpg",
            "https://hyalki-del.github.io/babarock/b4.jpg",
            "https://hyalki-del.github.io/babarock/b5.jpg",
            "https://hyalki-del.github.io/babarock/b6.jpg",
            "https://hyalki-del.github.io/babarock/b7.jpg"
        ];

        // Preload images
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        const shuffledImages = [...images].sort(() => Math.random() - 0.5);

        let currentIndex = 0;
        const logoImg = document.getElementById("randomLogo");

        if (logoImg && shuffledImages.length > 0) {
            logoImg.src = shuffledImages[currentIndex];

            setInterval(() => {
                // Trigger the voltage drop flicker animation
                logoImg.classList.add("bulb-buzz");

                // Swap the picture right in the middle of the deepest darkness drop (~180ms)
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % shuffledImages.length;
                    logoImg.src = shuffledImages[currentIndex];
                }, 180);

                // Clean up animation class after 0.45s so it can re-trigger next cycle
                setTimeout(() => {
                    logoImg.classList.remove("bulb-buzz");
                }, 450);

            }, 2500);
        }
    </script>

</body>
</html>
