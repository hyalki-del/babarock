<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Availability Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 p-4 md:p-8 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto space-y-6">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-gray-800 pb-5 gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Band Sync Matrix</h1>
                <p class="text-gray-400 text-sm">Select your name to toggle your busy dates.</p>
            </div>
            <div class="flex items-center gap-3">
                <label class="text-sm font-medium text-gray-300 whitespace-nowrap">Acting As:</label>
                <select id="userSelect" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="alex">Alex (Vocals)</option>
                    <option value="ben">Ben (Guitar)</option>
                    <option value="chloe">Chloe (Bass)</option>
                    <option value="dan">Dan (Drums)</option>
                    <option value="eva">Eva (Keys)</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <main class="lg:col-span-3 bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-2xl">
                <div class="text-center mb-6"><h2 class="text-xl font-bold text-white tracking-wide">July 2026</h2></div>
                <div class="grid grid-cols-7 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
            </main>

            <aside class="space-y-4">
                <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-xl">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">Band Roster Status</h3>
                    <div id="rosterList" class="space-y-2"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const bandData = {
            alex: { name: 'Alex', color: 'bg-red-500', busy: [10, 11, 20] },
            ben: { name: 'Ben', color: 'bg-blue-500', busy: [11, 12, 25] },
            chloe: { name: 'Chloe', color: 'bg-green-500', busy: [20, 21] },
            dan: { name: 'Dan', color: 'bg-amber-500', busy: [11, 27] },
            eva: { name: 'Eva', color: 'bg-purple-500', busy: [20, 28] }
        };

        let currentUser = 'alex';
        const userSelect = document.getElementById('userSelect');
        userSelect.addEventListener('change', (e) => { currentUser = e.target.value; render(); });

        function toggleDate(day) {
            const list = bandData[currentUser].busy;
            const index = list.indexOf(day);
            if (index > -1) list.splice(index, 1);
            else list.push(day);
            render();
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            // July 2026 starts on Wednesday (3 empty slots)
            for (let i = 0; i < 3; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'bg-gray-900/20 min-h-[90px]';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= 31; day++) {
                const busyMembers = Object.keys(bandData).filter(k => bandData[k].busy.includes(day));
                const isCurrentBusy = bandData[currentUser].busy.includes(day);
                const isFree = busyMembers.length === 0;

                const btn = document.createElement('button');
                btn.className = `min-h-[95px] flex flex-col justify-between p-2 rounded-lg border text-left transition-all ${
                    isCurrentBusy ? 'border-red-500/50 bg-red-950/20' : isFree ? 'border-emerald-500/20 bg-emerald-950/5' : 'border-gray-800 bg-gray-950/40'
                } hover:bg-gray-800/50`;
                btn.onclick = () => toggleDate(day);

                btn.innerHTML = `
                    <span class="text-sm font-bold ${isFree ? 'text-emerald-400' : 'text-gray-400'}">${day}</span>
                    <div class="flex flex-wrap gap-1 mt-2">
                        ${busyMembers.map(k => `<span class="text-[9px] px-1.5 py-0.5 rounded font-black text-white uppercase ${bandData[k].color}">${bandData[k].name[0]}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(btn);
            }

            const roster = document.getElementById('rosterList');
            roster.innerHTML = Object.keys(bandData).map(k => `
                <div class="flex items-center justify-between text-xs bg-gray-950 p-2.5 rounded-lg border border-gray-800">
                    <div class="flex items-center gap-2">
                        <span class="h-2 w-2 rounded-full ${bandData[k].color}"></span>
                        <span class="font-medium text-gray-300">${bandData[k].name}</span>
                    </div>
                    <span class="font-mono text-gray-500">${bandData[k].busy.length} busy days</span>
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
