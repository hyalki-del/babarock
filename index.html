<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LED Matrix Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }

        .welcome-card {
            text-align: center;
            max-width: 440px;
            width: 100%;
            background: #121212;
            padding: 0 25px 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* LED Marquee Display */
        .led-banner {
            width: 100%;
            height: 80px;
            background-color: #020202;
            border-bottom: 2px solid #282828;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .led-banner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.5) 40%, transparent 45%);
            background-size: 3px 3px;
            pointer-events: none;
            z-index: 2;
        }

        .led-track {
            display: flex;
            white-space: nowrap;
            width: max-content;
            animation: marqueeSlide 18s linear infinite;
        }

        @keyframes marqueeSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .led-content {
            display: flex;
            align-items: center;
            gap: 30px;
            padding-right: 30px;
            font-family: 'VT323', monospace;
            font-size: 2.9rem;
            line-height: 1;
            color: #ff3300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 1px #ff3300;
            -webkit-font-smoothing: none;
        }

        .led-content i {
            font-size: 2.2rem;
            color: #ffb700;
            text-shadow: 0 0 1px #ffb700;
        }

        /* Logo Styling */
        .logo-container {
            margin-bottom: 35px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-img {
            max-width: 260px;
            max-height: 280px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            display: block;
        }

        @keyframes bulbFlicker {
            0%   { opacity: 1;   filter: brightness(1);   transform: scale(1); }
            10%  { opacity: 0.3; filter: brightness(0.4); transform: scale(0.99); }
            20%  { opacity: 0.8; filter: brightness(1.1); transform: scale(1.01); }
            35%  { opacity: 0.1; filter: brightness(0.2); transform: scale(0.98); }
            50%  { opacity: 0.6; filter: brightness(0.7); transform: scale(1); }
            65%  { opacity: 0.2; filter: brightness(0.3); transform: scale(0.99); }
            80%  { opacity: 0.9; filter: brightness(1.2); transform: scale(1.01); }
            100% { opacity: 1;   filter: brightness(1);   transform: scale(1); }
        }

        .bulb-buzz {
            animation: bulbFlicker 0.45s ease-in-out;
        }

        /* Navigation Buttons */
        .navigation-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #1a1a1a;
            border: 2px solid #282828;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .action-button i {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 28px;
            text-align: center;
            color: #ff4500;
        }

        .action-button:hover {
            color: #ffffff;
            background: #222222;
            border-color: #ff4500;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 68, 0, 0.15);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <!-- LED Banner -->
        <div class="led-banner">
            <div class="led-track">
                <div class="led-content">
                    <span><i class="fa-solid fa-bolt"></i> BABA ROCK LIVE EXPERIENCE</span>
                    <span><i class="fa-solid fa-microphone-lines"></i> STAGE REHEARSAL</span>
                    <span><i class="fa-solid fa-compact-disc"></i> NON-STOP ROCK & METAL</span>
                    <span><i class="fa-solid fa-calendar-check"></i> TAKVİMİ KONTROL ET</span>
                    <span><i class="fa-solid fa-guitar"></i> LET'S ROCK AND ROLL</span>
                </div>
                <!-- Duplicate for seamless continuous scroll -->
                <div class="led-content" aria-hidden="true">
                    <span><i class="fa-solid fa-bolt"></i> BABA ROCK LIVE EXPERIENCE</span>
                    <span><i class="fa-solid fa-microphone-lines"></i> STAGE REHEARSAL</span>
                    <span><i class="fa-solid fa-compact-disc"></i> NON-STOP ROCK & METAL</span>
                    <span><i class="fa-solid fa-calendar-check"></i> TAKVİMİ KONTROL ET</span>
                    <span><i class="fa-solid fa-guitar"></i> LET'S ROCK AND ROLL</span>
                </div>
            </div>
        </div>

        <!-- Logo Container -->
        <div class="logo-container">
            <img id="randomLogo" src="https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg" alt="Baba Rock Logo" class="logo-img">
        </div>

        <!-- Navigation -->
        <nav class="navigation-list">
            <a href="https://hyalki-del.github.io/babarock/takvim.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Takvim</span>
            </a>

            <a href="https://hyalki-del.github.io/babarock/playlist.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-music"></i>
                <span>Playlist</span>
            </a>

            <!-- Rehearsal Button Integration -->
            <a href="https://hyalki-del.github.io/babarock/rehearsal.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-microphone-lines"></i>
                <span>Rehearsal</span>
            </a>
            
            <a href="https://hyalki-del.github.io/babarock/advisor.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-dice"></i>
                <span>Şarkı seçici</span>
            </a>
        </nav>
    </div>

    <script>
        const images = [
            "https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg",
            "https://hyalki-del.github.io/babarock/b1.jpg",
            "https://hyalki-del.github.io/babarock/b2.jpg",
            "https://hyalki-del.github.io/babarock/b3.jpg",
            "https://hyalki-del.github.io/babarock/b4.jpg",
            "https://hyalki-del.github.io/babarock/b5.jpg",
            "https://hyalki-del.github.io/babarock/b6.jpg",
            "https://hyalki-del.github.io/babarock/b7.jpg"
        ];

        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        const shuffledImages = [...images].sort(() => Math.random() - 0.5);
        let currentIndex = 0;
        const logoImg = document.getElementById("randomLogo");

        if (logoImg && shuffledImages.length > 0) {
            logoImg.src = shuffledImages[currentIndex];

            setInterval(() => {
                logoImg.classList.add("bulb-buzz");
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % shuffledImages.length;
                    logoImg.src = shuffledImages[currentIndex];
                }, 180);

                setTimeout(() => {
                    logoImg.classList.remove("bulb-buzz");
                }, 450);
            }, 2500);
        }
    </script>

</body>
</html>
