name: Sync Ultimate Guitar Playlist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js Engine
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch Playlist Data via Native Fetch
        run: |
          node -e "
          const fs = require('fs');

          function decodeHTMLEntities(str) {
            return str
              .replace(/&quot;/g, '\"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, \"'\");
          }

          (async () => {
            const url = 'https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r';
            
            console.log('Fetching HTML directly via Node.js native engine...');
            const response = await fetch(url, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.9',
                'Cache-Control': 'no-cache'
              }
            });

            if (!response.ok) {
              throw new Error('HTTP Request failed with status: ' + response.status);
            }

            const html = await response.text();

            const match = html.match(/class=\"js-store\"[^\>]*data-content=\"([^\"]+)\"/i) || 
                          html.match(/data-content=\"([^\"]+)\"[^\>]*class=\"js-store\"/i);

            if (!match || !match[1]) {
              console.error('HTML snippet sample:', html.substring(0, 500));
              throw new Error('Could not locate js-store data-content attribute in page HTML.');
            }

            const decodedJson = decodeHTMLEntities(match[1]);
            const storeData = JSON.parse(decodedJson);

            const pageData = storeData.store?.page?.data || storeData.data || {};
            const rawItems = 
              pageData.songbook?.tabs || 
              pageData.playlist?.items || 
              pageData.list?.list || 
              pageData.tabs || 
              [];

            const songs = rawItems.map(item => {
              const tab = item.tab || item;
              const key = 
                tab.tonality_name || 
                tab.meta?.tonality_name || 
                tab.tonality || 
                tab.key_name || 
                'N/A';

              return {
                title: tab.song_name || tab.song_title || tab.title || '',
                artist: tab.artist_name || tab.band_name || tab.artist || '',
                key: key
              };
            }).filter(s => s.title && s.artist);

            if (songs.length > 0) {
              fs.writeFileSync('playlist.json', JSON.stringify(songs, null, 2));
              console.log('Successfully saved ' + songs.length + ' songs to playlist.json with tonality data.');
            } else {
              console.error('Data container parsed, but no song entries were found.');
              process.exit(1);
            }
          })().catch(err => {
            console.error('Execution Error:', err.message);
            process.exit(1);
          });
          "

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update playlist.json with key info" && git push)
