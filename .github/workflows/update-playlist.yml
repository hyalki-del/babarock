name: Sync Ultimate Guitar Playlist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Playlist Data
        run: |
          python -c "
          import requests, json
          from bs4 import BeautifulSoup

          url = 'https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r'
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}

          res = requests.get(url, headers=headers)
          soup = BeautifulSoup(res.text, 'html.parser')
          store_div = soup.find('div', class_='js-store')

          cleaned = []
          if store_div:
              raw_data = json.loads(store_div['data-content'])
              parent = raw_data.get('store', {}).get('page', {}).get('data', {})

              # Ultimate Guitar stores tabs in songbook or playlist key depending on account settings
              raw_items = []
              if 'songbook' in parent and 'tabs' in parent['songbook']:
                  raw_items = parent['songbook']['tabs']
              elif 'playlist' in parent and 'items' in parent['playlist']:
                  raw_items = parent['playlist']['items']
              elif 'list' in parent and 'list' in parent['list']:
                  raw_items = parent['list']['list']

              for item in raw_items:
                  # Extract tab object if nested
                  tab = item.get('tab', item)
                  title = tab.get('song_name', tab.get('song_title', ''))
                  artist = tab.get('artist_name', tab.get('band_name', ''))
                  if title and artist:
                      cleaned.append({'title': title, 'artist': artist})

              with open('playlist.json', 'w', encoding='utf-8') as f:
                  json.dump(cleaned, f, ensure_ascii=False, indent=2)
              print(f'Successfully saved {len(cleaned)} tracks!')
          else:
              print('Could not find store div')
          "

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update playlist.json" && git push)
