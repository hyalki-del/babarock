name: Sync Ultimate Guitar Playlist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js Engine
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch Playlist Data & Merge Key Overrides
        run: |
          node -e "
          const fs = require('fs');

          // Normalizes strings for robust, fault-tolerant title matching
          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .replace(/[^a-z0-9]/g, '');
          }

          function decodeHTMLEntities(str) {
            return str
              .replace(/&quot;/g, '\"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, \"'\");
          }

          (async () => {
            // 1. Load custom key overrides dictionary
            let overrides = {};
            if (fs.existsSync('key-overrides.json')) {
              try {
                overrides = JSON.parse(fs.readFileSync('key-overrides.json', 'utf8'));
                console.log('Loaded ' + Object.keys(overrides).length + ' key overrides.');
              } catch (e) {
                console.warn('Warning: Failed to parse key-overrides.json. Falling back to defaults.');
              }
            }

            const normalizedOverrides = {};
            for (const [title, key] of Object.entries(overrides)) {
              normalizedOverrides[normalize(title)] = key;
            }

            // 2. Fetch live payload from Ultimate Guitar
            const url = 'https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r';
            
            console.log('Fetching live payload from Ultimate Guitar...');
            const response = await fetch(url, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.9',
                'Cache-Control': 'no-cache'
              }
            });

            if (!response.ok) {
              throw new Error('HTTP request failed with status code: ' + response.status);
            }

            const html = await response.text();

            // 3. Extract SSR JSON store from DOM attribute
            const match = html.match(/class=\"js-store\"[^\>]*data-content=\"([^\"]+)\"/i) || 
                          html.match(/data-content=\"([^\"]+)\"[^\>]*class=\"js-store\"/i);

            if (!match || !match[1]) {
              throw new Error('Failed to locate target data store inside document body.');
            }

            const decodedJson = decodeHTMLEntities(match[1]);
            const storeData = JSON.parse(decodedJson);

            const pageData = storeData.store?.page?.data || storeData.data || {};
            const rawItems = 
              pageData.songbook?.tabs || 
              pageData.playlist?.items || 
              pageData.list?.list || 
              pageData.tabs || 
              [];

            // 4. Construct final normalized schema
            const songs = rawItems.map(item => {
              const tab = item.tab || item;
              const title = tab.song_name || tab.song_title || tab.title || '';
              const artist = tab.artist_name || tab.band_name || tab.artist || '';
              
              const defaultKey = 
                tab.tonality_name || 
                tab.meta?.tonality_name || 
                tab.tonality || 
                tab.key_name || 
                'N/A';

              const matchedKey = normalizedOverrides[normalize(title)];

              return {
                title,
                artist,
                key: matchedKey ? matchedKey : defaultKey
              };
            }).filter(s => s.title && s.artist);

            // 5. Atomic write operation
            if (songs.length > 0) {
              fs.writeFileSync('playlist.json', JSON.stringify(songs, null, 2));
              console.log('Successfully saved ' + songs.length + ' songs to playlist.json');
            } else {
              console.error('Data payload extracted, but 0 valid song entries found.');
              process.exit(1);
            }
          })().catch(err => {
            console.error('Fatal Execution Error:', err.message);
            process.exit(1);
          });
          "

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update playlist.json with matched keys" && git push)
