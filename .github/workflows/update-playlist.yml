name: Sync Ultimate Guitar Playlist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Fetch Playlist via Browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            
            await page.goto('https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r', { 
              waitUntil: 'domcontentloaded',
              timeout: 60000 
            });
            
            // Wait up to 15 seconds for window.UGApp state to be ready
            try {
              await page.waitForFunction(() => !!(window.UGApp && window.UGApp.store && window.UGApp.store.page), { timeout: 15000 });
            } catch (e) {
              console.log('Timed out waiting for UGApp object.');
            }
            
            const songs = await page.evaluate(() => {
              const data = window.UGApp?.store?.page?.data;
              if (!data) return [];
              const rawItems = data.songbook?.tabs || data.playlist?.items || data.list?.list || [];
              return rawItems.map(item => {
                const tab = item.tab || item;
                return {
                  title: tab.song_name || tab.song_title || '',
                  artist: tab.artist_name || tab.band_name || ''
                };
              }).filter(s => s.title && s.artist);
            });

            await browser.close();

            if (songs.length > 0) {
              fs.writeFileSync('playlist.json', JSON.stringify(songs, null, 2));
              console.log('Saved ' + songs.length + ' songs.');
            } else {
              console.error('No songs found.');
              process.exit(1);
            }
          })();
          "

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update playlist.json" && git push)
