name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual execution trigger
  schedule:
    - cron: '0 0 * * 0' # Weekly run (Sunday 00:00 UTC)

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Execute Lyrics Fetcher
        run: |
          python fetch_lyrics.py

      - name: Commit and Push Scraped Lyrics
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add songs/
          
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated lyrics update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "[+] No new lyric files detected. Skipping commit step."
          fi
