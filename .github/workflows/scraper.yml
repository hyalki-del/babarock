name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual trigger button
  schedule:
    - cron: '0 0 * * 0' # Weekly run (Sunday UTC)

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ug-scraper/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Scraper
        run: |
          python scraper.py

      - name: Commit and Push Scraped Lyrics
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add songs/
          
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated lyrics update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes found in songs directory."
          fi

      - name: Upload Debug Snapshot on Failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: failure-debug-snapshot
          path: ug-scraper/debug_failed_page.html
          retention-days: 3
