name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lyricsgenius

      - name: Execute Genius Lyrics Fetcher
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: |
          python fetch_lyrics.py

      - name: Debug Output Directory
        run: |
          echo "=== Contents of ug-scraper/songs ==="
          ls -la songs/ || echo "Directory does not exist"

      - name: Commit and Push Scraped Lyrics
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force add in case directory is ignored by root .gitignore
          git add -f songs/
          
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated Genius lyrics update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "[+] No new lyric files detected. Skipping commit."
          fi
