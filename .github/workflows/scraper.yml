name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual trigger option
  schedule:
    - cron: '0 0 * * 0' # Automated weekly run (Sunday 00:00 UTC)

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ug-scraper/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install lyricsgenius; fi

      - name: Execute Scraper Pipeline
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: |
          python fetch_lyrics.py

      - name: Commit and Push Scraped Lyrics
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add songs/
          
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated lyrics update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "[+] No new lyric files detected. Skipping commit."
          fi

      - name: Upload Debug Error Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: execution-error-log
          path: ug-scraper/debug_execution_error.log
          if-no-files-found: ignore
          retention-days: 3
