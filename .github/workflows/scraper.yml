- name: Execute Ultimate Guitar Tab Fetcher
        run: |
          python fetch_lyrics.py

      - name: Commit and Push Songs Directory
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -f ug-scraper/songs/ || git add -f songs/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(data): updated UG tabs and lyrics [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "[+] No changes detected in songs folder. Skipping commit."
          fi
