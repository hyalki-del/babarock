name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual trigger button in GitHub UI
  schedule:
    - cron: '0 0 * * 0' # Automated run: Every Sunday at midnight UTC

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history ensures clean branch pushing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ug-scraper/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & Chromium Browsers
        run: |
          playwright install --with-deps chromium

      - name: Execute Scraper
        run: |
          python scraper.py

      - name: Commit and Push Scraped Songs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the output directory
          git add songs/
          
          # Commit only if new or modified files exist
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated playlist scrape [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes found in songs directory. Skipping commit."
          fi

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: ug-scraper/debug/
          retention-days: 3
