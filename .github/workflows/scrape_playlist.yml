name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual execution button in GitHub UI
  schedule:
    - cron: '0 0 * * 0' # Automated trigger: Every Sunday at midnight UTC

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetches full history for branch context

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ug-scraper/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & Chromium
        run: |
          playwright install --with-deps chromium

      - name: Execute Scraper
        run: |
          python scraper.py

      - name: Commit and Push Scraped Songs
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the songs directory
          git add songs/
          
          # Check for changes inside ug-scraper/songs/
          if [ -n "$(git status --porcelain songs/)" ]; then
            git commit -m "chore(data): automated playlist update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No new changes detected in songs directory. Skipping commit."
          fi

      - name: Upload Debug Artifact on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-failure-snapshot
          path: ug-scraper/debug_failed_page.html
          retention-days: 7
