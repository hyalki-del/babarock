name: Run Subfolder Playlist Scraper

on:
  workflow_dispatch:  # Manual trigger button
  schedule:
    - cron: '0 0 * * 0' # Weekly run

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ug-scraper

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ug-scraper/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & Chromium
        run: |
          playwright install --with-deps chromium

      - name: Execute Scraper
        run: |
          python scraper.py

      - name: Commit and Push Songs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the songs directory
          git add songs/
          
          # Safely check for changes without throwing exit code 1
          if git status --porcelain | grep -q 'songs/'; then
            git commit -m "Automated update: Scraped songs into ug-scraper/songs"
            git push
          else
            echo "No changes in songs directory. Skipping commit."
          fi
