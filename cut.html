<script>
    // Replace with your Google Apps Script Web App Endpoint URL
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyrIg2w1eHU2fruqixpNKLCtvTtgZ1N4inHOx5g8z_DiAR8W9NiZkK0Cf0D106HHyrp/exec";
    
    let playlistData = [];
    let keyMapData = {};
    let activeEditSong = null;
    let clickTimer = null;

    function normalizeTitle(str) {
        return str
            .toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9]/g, "");
    }

    async function loadPlaylist() {
        const countElement = document.getElementById("songCount");

        try {
            const timestamp = new Date().getTime();
            const [resPlaylist, resKeys] = await Promise.all([
                fetch(`./playlist.json?t=${timestamp}`),
                fetch(`${GOOGLE_SHEET_API_URL}?t=${timestamp}`)
            ]);

            playlistData = await resPlaylist.json();
            keyMapData = await resKeys.json();

            renderUI();

            // Non-blocking background sync: Automatically adds missing songs from playlist.json to Google Sheets
            syncPlaylistWithSheets(playlistData);

        } catch (err) {
            console.error(err);
            countElement.textContent = "Error";
        }
    }

    function renderUI() {
        const listElement = document.getElementById("songList");
        const countElement = document.getElementById("songCount");

        const normalizedKeyMap = {};
        for (const [title, key] of Object.entries(keyMapData)) {
            normalizedKeyMap[normalizeTitle(title)] = key;
        }

        listElement.innerHTML = "";
        countElement.textContent = `${playlistData.length} Songs`;

        playlistData.forEach((item, index) => {
            const li = document.createElement("li");
            const query = encodeURIComponent(`${item.title} ${item.artist}`);
            const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;
            
            const normTitle = normalizeTitle(item.title);
            const detectedKey = normalizedKeyMap[normTitle] || item.key || null;
            const keyBadgeHtml = (detectedKey && detectedKey !== 'N/A') 
                ? `<span class="key-badge">${detectedKey}</span>` 
                : '';

            li.className = "song-item-card";

            // Unified Click Handler using native UIEvent.detail
            li.onclick = (e) => {
                // e.detail returns 1 for first click, 2 for second click in rapid succession
                if (e.detail === 1) {
                    clickTimer = setTimeout(() => {
                        window.open(youtubeUrl, '_blank', 'noopener,noreferrer');
                    }, 300); // 300ms window comfortably covers normal human double-click speed
                } else if (e.detail === 2) {
                    // Double click detected: cancel single-click timer & open modal
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                        clickTimer = null;
                    }
                    openModal(item, detectedKey);
                }
            };

            li.innerHTML = `
                <div class="song-left">
                    <span class="song-number">${index + 1}</span>
                    <div class="song-info">
                        <span class="song-title">${item.title}</span>
                        <span class="song-artist">${item.artist}</span>
                    </div>
                </div>
                <div class="actions-right">
                    ${keyBadgeHtml}
                    <i class="fa-brands fa-youtube yt-icon"></i>
                </div>
            `;
            listElement.appendChild(li);
        });
    }

    function openModal(item, currentKey) {
        activeEditSong = item;
        document.getElementById("modalSongName").textContent = `${item.title} - ${item.artist}`;
        document.getElementById("modalKeyInput").value = currentKey && currentKey !== 'N/A' ? currentKey : '';
        document.getElementById("editModal").style.display = "flex";
        document.getElementById("modalKeyInput").focus();
    }

    function closeModal() {
        document.getElementById("editModal").style.display = "none";
        activeEditSong = null;
    }

    async function submitKeyUpdate() {
        if (!activeEditSong) return;

        const newKey = document.getElementById("modalKeyInput").value.trim();
        const saveBtn = document.getElementById("saveBtn");
        
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try {
            const response = await fetch(GOOGLE_SHEET_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    song: activeEditSong.title,
                    key: newKey || 'N/A'
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                keyMapData[activeEditSong.title] = newKey;
                renderUI();
                closeModal();
            } else {
                alert("Error updating key: " + result.message);
            }
        } catch (err) {
            console.error("Save failed:", err);
            alert("Network error. Key could not be saved to Google Sheets.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "Save";
        }
    }

    // Background Auto-Reconciliation Routine
    async function syncPlaylistWithSheets(playlist) {
        try {
            const songTitles = playlist.map(item => item.title);
            fetch(GOOGLE_SHEET_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: "sync_playlist",
                    songs: songTitles
                })
            });
        } catch (e) {
            console.warn("Background sheet reconciliation skipped:", e);
        }
    }

    // Allow 'Enter' key inside input field to trigger save action
    document.getElementById("modalKeyInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            submitKeyUpdate();
        }
    });

    loadPlaylist();
</script>
