<script>
        let playlist = [];

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                playlist = await res.json();
                if (playlist.length > 0) {
                    generateRecommendations();
                }
            } catch (err) {
                console.error(err);
                document.getElementById("seedTitle").textContent = "Error loading playlist";
            }
        }

        function cleanText(text) {
            return text
                .replace(/\(.*?\)|\[.*?\]/g, '')
                .replace(/-(.*)(Remaster|Live|Deluxe|Version).*/i, '')
                .trim();
        }

        // Fetch YouTube Auto-Suggest via JSONP (No CORS proxy required)
        function fetchYTSuggestionsJSONP(query) {
            return new Promise((resolve) => {
                const callbackName = 'yt_callback_' + Math.random().toString(36).substring(2, 9);
                const script = document.createElement('script');
                
                // Set timeout safety in case request drops
                const timeout = setTimeout(() => {
                    cleanup();
                    resolve([]);
                }, 3000);

                function cleanup() {
                    clearTimeout(timeout);
                    if (window[callbackName]) delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                }

                window[callbackName] = function(data) {
                    cleanup();
                    if (data && data[1]) {
                        // Extract array of suggestion strings
                        const results = data[1].map(item => Array.isArray(item) ? item[0] : item);
                        resolve(results);
                    } else {
                        resolve([]);
                    }
                };

                script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}&jsonp=${callbackName}`;
                script.onerror = () => {
                    cleanup();
                    resolve([]);
                };

                document.body.appendChild(script);
            });
        }

        async function generateRecommendations() {
            if (!playlist || playlist.length === 0) return;

            const recList = document.getElementById("recList");
            const seedTitle = document.getElementById("seedTitle");
            const seedArtist = document.getElementById("seedArtist");

            // Pick random seed from playlist
            const seed = playlist[Math.floor(Math.random() * playlist.length)];
            const cleanTitleStr = cleanText(seed.title);
            const cleanArtistStr = cleanText(seed.artist);

            seedTitle.textContent = seed.title;
            seedArtist.textContent = seed.artist;

            recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">Fetching YouTube suggestions...</span></li>`;

            // Query YouTube Auto-Complete
            const primaryQuery = `${cleanArtistStr} ${cleanTitleStr} similar`;
            let suggestions = await fetchYTSuggestionsJSONP(primaryQuery);

            if (suggestions.length < 3) {
                const secondary = await fetchYTSuggestionsJSONP(`songs like ${cleanArtistStr}`);
                suggestions = [...suggestions, ...secondary];
            }

            // Fallback: If YouTube suggestions are too short, generate direct YouTube search links
            if (suggestions.length === 0) {
                suggestions = [
                    `${cleanArtistStr} best songs`,
                    `${cleanArtistStr} similar bands`,
                    `Bands like ${cleanArtistStr}`,
                    `${cleanArtistStr} live performance`,
                    `${cleanArtistStr} full album`
                ];
            }

            // Remove duplicate entries
            const uniqueSuggestions = [...new Set(suggestions)];
            renderResults(uniqueSuggestions);
        }

        function renderResults(suggestions) {
            const recList = document.getElementById("recList");
            recList.innerHTML = "";

            suggestions.slice(0, 5).forEach(phrase => {
                const query = encodeURIComponent(phrase);
                const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;

                const li = document.createElement("li");
                li.innerHTML = `
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="rec-item" title="Open YouTube Search">
                        <div class="rec-info">
                            <span class="rec-song-title">${phrase}</span>
                            <span class="rec-song-artist">Search on YouTube</span>
                        </div>
                        <i class="fa-brands fa-youtube yt-icon"></i>
                    </a>
                `;
                recList.appendChild(li);
            });
        }

        init();
    </script>
