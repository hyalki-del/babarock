<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baba Rock - Rehearsal</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SortableJS for Smooth Drag-and-Drop (Touch & Desktop) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <style>
        /* Base Reset & Mobile WebKit Fixes */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-box-align: start;
            -webkit-align-items: flex-start;
            align-items: flex-start;
            padding: 16px 8px;
        }

        .app-container {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: horizontal;
            -webkit-box-direction: normal;
            -webkit-flex-direction: row;
            flex-direction: row;
            gap: 10px;
            max-width: 1000px;
            width: 100%;
            -webkit-box-align: start;
            -webkit-align-items: flex-start;
            align-items: flex-start;
        }

        .playlist-card, .selected-card {
            -webkit-box-flex: 1;
            -webkit-flex: 1 1 50%;
            flex: 1 1 50%;
            width: 50%;
            min-width: 0;
            background: #121212;
            padding: 14px 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        .header {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: justify;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid #222222;
            padding-bottom: 8px;
            gap: 4px;
        }

        .header h1 {
            font-size: 0.95rem;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            white-space: nowrap;
        }

        .header h1 i { color: #ff4500; }

        .header-actions {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 4px;
        }

        .btn-shuffle, .btn-setlist {
            background: #1a1a1a;
            color: #ff4500;
            border: 1px solid #282828;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: -webkit-inline-box;
            display: -webkit-inline-flex;
            display: inline-flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 4px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .btn-shuffle:hover, .btn-shuffle:active {
            background: #ff4500;
            color: #ffffff;
            border-color: #ff4500;
        }

        .btn-setlist {
            background: #ff4500;
            color: #ffffff;
            border-color: #ff4500;
        }

        .btn-setlist:hover, .btn-setlist:active {
            background: #e03d00;
            border-color: #e03d00;
        }

        .song-count {
            font-size: 0.7rem;
            color: #888888;
            background: #1a1a1a;
            padding: 3px 6px;
            border-radius: 8px;
            border: 1px solid #282828;
            white-space: nowrap;
        }

        .song-list {
            list-style: none;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
            gap: 6px;
            max-height: 520px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }

        .song-list::-webkit-scrollbar { width: 3px; }
        .song-list::-webkit-scrollbar-thumb { background: #282828; border-radius: 2px; }

        .song-item-card {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: justify;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 8px 8px;
            border-radius: 8px;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            cursor: pointer;
            min-width: 0;
            touch-action: manipulation;
        }

        .song-item-card:hover, .song-item-card:active {
            border-color: #ff4500;
            background-color: #222222;
        }

        .song-left {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            min-width: 0;
            -webkit-box-flex: 1;
            -webkit-flex-grow: 1;
            flex-grow: 1;
        }

        .drag-handle {
            color: #555555;
            margin-right: 6px;
            cursor: grab;
            font-size: 0.75rem;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
            padding: 4px;
        }

        .drag-handle:active { cursor: grabbing; }

        .song-number {
            font-size: 0.75rem;
            color: #ff4500;
            font-weight: bold;
            width: 18px;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }

        .song-info {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -webkit-flex-direction: column;
            flex-direction: column;
            min-width: 0;
            -webkit-box-flex: 1;
            -webkit-flex-grow: 1;
            flex-grow: 1;
        }

        .song-title {
            font-weight: 600;
            font-size: 0.8rem;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 0.7rem;
            color: #a0a0a0;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions-right {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            gap: 4px;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }

        .key-badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: #ff4500;
            background: #121212;
            border: 1px solid #ff4500;
            padding: 2px 5px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .yt-icon {
            color: #ff0000;
            font-size: 1rem;
            margin-left: 2px;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
            text-decoration: none;
            padding: 2px;
        }

        .empty-state {
            color: #666666;
            font-size: 0.75rem;
            text-align: center;
            padding: 15px 0;
            font-style: italic;
        }

        .sortable-ghost {
            opacity: 0.4;
            background-color: #2a2a2a !important;
            border: 1px dashed #ff4500 !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Left Column: Available Songs -->
        <div class="playlist-card">
            <div class="header">
                <h1><i class="fa-solid fa-music"></i> Playlist</h1>
                <div class="header-actions">
                    <button class="btn-shuffle" id="shuffleBtn" onclick="shufflePlaylist()">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                    <span class="song-count" id="songCount">...</span>
                </div>
            </div>
            <ul class="song-list" id="songList"></ul>
        </div>

        <!-- Right Column: Picked Songs -->
        <div class="selected-card">
            <div class="header">
                <h1><i class="fa-solid fa-circle-check"></i> Selected</h1>
                <div class="header-actions">
                    <button class="btn-setlist" onclick="openSetlist()">
                        <i class="fa-solid fa-list-check"></i> Setlist
                    </button>
                    <span class="song-count" id="selectedCount">0</span>
                </div>
            </div>
            <ul class="song-list" id="selectedList"></ul>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyrIg2w1eHU2fruqixpNKLCtvTtgZ1N4inHOx5g8z_DiAR8W9NiZkK0Cf0D106HHyrp/exec";

        let availablePlaylist = [];
        let selectedSongs = [];
        let keyMapData = {};
        let sortableInstance = null;

        function normalizeTitle(str) {
            if (!str) return "";
            return str
                .toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]/g, "");
        }

        async function fetchWithTimeout(url, timeoutMs = 5000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                return response;
            } catch (err) {
                clearTimeout(timeoutId);
                throw err;
            }
        }

        async function loadPlaylist() {
            const countElement = document.getElementById("songCount");
            const timestamp = new Date().getTime();

            // STEP 1: Fast local load (Immediate UI rendering)
            try {
                const resPlaylist = await fetch(`./playlist.json?t=${timestamp}`);
                availablePlaylist = await resPlaylist.json();
                renderUI();
                initSortable();
            } catch (err) {
                console.error("Critical: Could not load playlist.json", err);
                countElement.textContent = "Error";
                return;
            }

            // STEP 2: Fetch Google Sheet Keys in background with a strict 4-second timeout
            try {
                const resKeys = await fetchWithTimeout(`${GOOGLE_SHEET_API_URL}?t=${timestamp}`, 4000);
                keyMapData = await resKeys.json();
                
                const normalizedKeyMap = {};
                for (const [title, key] of Object.entries(keyMapData)) {
                    normalizedKeyMap[normalizeTitle(title)] = key;
                }

                // Update keys in availablePlaylist
                availablePlaylist = availablePlaylist.map(item => ({
                    ...item,
                    key: normalizedKeyMap[normalizeTitle(item.title)] || item.key || 'N/A'
                }));

                // Update keys in selectedSongs if user already dragged items
                selectedSongs = selectedSongs.map(item => ({
                    ...item,
                    key: normalizedKeyMap[normalizeTitle(item.title)] || item.key || 'N/A'
                }));

                renderUI();
            } catch (err) {
                console.warn("Google Sheets keys unavailable or timed out:", err);
            }
        }

        function initSortable() {
            const selectedListElement = document.getElementById("selectedList");
            
            sortableInstance = new Sortable(selectedListElement, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    const item = selectedSongs.splice(evt.oldIndex, 1)[0];
                    selectedSongs.splice(evt.newIndex, 0, item);
                    renderUI();
                }
            });
        }

        function shufflePlaylist() {
            if (availablePlaylist.length <= 1) return;

            for (let i = availablePlaylist.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availablePlaylist[i], availablePlaylist[j]] = [availablePlaylist[j], availablePlaylist[i]];
            }
            renderUI();
        }

        function pickSong(index) {
            const [picked] = availablePlaylist.splice(index, 1);
            selectedSongs.push(picked);
            renderUI();
        }

        function unpickSong(index) {
            const [unpicked] = selectedSongs.splice(index, 1);
            availablePlaylist.push(unpicked);
            renderUI();
        }

        function openSetlist() {
            if (selectedSongs.length === 0) {
                alert("Please select at least one song first.");
                return;
            }

            const win = window.open("", "_blank");
            
            let listHtml = selectedSongs.map((item, i) => {
                const keyStr = (item.key && item.key !== 'N/A') ? ` (${item.key})` : '';
                return `<div>${i + 1}-${item.title}-${item.artist}${keyStr}</div>`;
            }).join("");

            win.document.write(`
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Setlist</title>
                    <style>
                        body { background-color: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; padding: 16px; }
                        .setlist-frame { border: 2px solid #000000; padding: 12px; display: inline-block; width: 100%; box-sizing: border-box; }
                        .setlist-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #000000; padding-bottom: 4px; }
                        .song-line { font-size: 0.9rem; line-height: 1.5; }
                    </style>
                </head>
                <body>
                    <div class="setlist-frame">
                        <div class="setlist-title">SETLIST</div>
                        <div class="song-line">${listHtml}</div>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }

        function renderUI() {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");
            const selectedListElement = document.getElementById("selectedList");
            const selectedCountElement = document.getElementById("selectedCount");

            // 1. Render Available Songs (Playlist)
            listElement.innerHTML = "";
            countElement.textContent = `${availablePlaylist.length}`;

            if (availablePlaylist.length === 0) {
                listElement.innerHTML = `<li class="empty-state">All picked!</li>`;
            } else {
                availablePlaylist.forEach((item, index) => {
                    const li = document.createElement("li");
                    const query = encodeURIComponent(`${item.title} ${item.artist}`);
                    const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;

                    li.className = "song-item-card";
                    li.title = "Click to select this song";
                    li.onclick = () => pickSong(index);

                    const keyBadgeHtml = (item.key && item.key !== 'N/A') 
                        ? `<span class="key-badge">${item.key}</span>` 
                        : '';

                    li.innerHTML = `
                        <div class="song-left">
                            <span class="song-number">${index + 1}</span>
                            <div class="song-info">
                                <span class="song-title">${item.title}</span>
                                <span class="song-artist">${item.artist}</span>
                            </div>
                        </div>
                        <div class="actions-right">
                            ${keyBadgeHtml}
                            <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="fa-brands fa-youtube yt-icon" title="Listen on YouTube" onclick="event.stopPropagation();"></a>
                        </div>
                    `;
                    listElement.appendChild(li);
                });
            }

            // 2. Render Picked Songs (Selected)
            selectedListElement.innerHTML = "";
            selectedCountElement.textContent = `${selectedSongs.length}`;

            if (selectedSongs.length === 0) {
                selectedListElement.innerHTML = `<li class="empty-state">None picked yet.</li>`;
            } else {
                selectedSongs.forEach((item, index) => {
                    const li = document.createElement("li");
                    const query = encodeURIComponent(`${item.title} ${item.artist}`);
                    const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;

                    li.className = "song-item-card";
                    li.title = "Click to return to playlist";
                    
                    li.onclick = () => unpickSong(index);

                    const keyBadgeHtml = (item.key && item.key !== 'N/A') 
                        ? `<span class="key-badge">${item.key}</span>` 
                        : '';

                    li.innerHTML = `
                        <div class="song-left">
                            <i class="fa-solid fa-grip-vertical drag-handle" title="Hold to drag" onclick="event.stopPropagation();"></i>
                            <span class="song-number">${index + 1}</span>
                            <div class="song-info">
                                <span class="song-title">${item.title}</span>
                                <span class="song-artist">${item.artist}</span>
                            </div>
                        </div>
                        <div class="actions-right">
                            ${keyBadgeHtml}
                            <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="fa-brands fa-youtube yt-icon" title="Listen on YouTube" onclick="event.stopPropagation();"></a>
                        </div>
                    `;
                    selectedListElement.appendChild(li);
                });
            }
        }

        loadPlaylist();
    </script>

</body>
</html>
