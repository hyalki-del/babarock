<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock</title>
    <!-- Font Awesome for crisp icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset & Dark Metal Theme Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Container Card - Strict Single Column Constraints */
        .welcome-card {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: #121212;
            padding: 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
            z-index: 10;
        }

        /* Logo Configuration & Electric Cut-off Animation */
        .logo-container {
            margin-bottom: 35px;
            background: transparent;
        }

        .logo-img {
            max-width: 260px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: inline-block;
            /* Electric cutoff animation loop: runs endlessly every 4 seconds */
            animation: electric-cutoff 4s linear infinite;
        }

        /* Electric Cut-off Glitch/Flicker Animation Keyframes */
        @keyframes electric-cutoff {
            0%, 79%, 83%, 87%, 91%, 95%, 100% {
                opacity: 1;
                filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.4)) brightness(1);
                transform: translateX(0) skewX(0deg);
            }
            80% {
                opacity: 0.1;
                filter: drop-shadow(0 0 0px rgba(0,0,0,0)) brightness(0.2);
                transform: translateX(-5px) skewX(-3deg);
            }
            81% {
                opacity: 0.8;
                filter: drop-shadow(0 0 25px rgba(0, 183, 255, 0.8)) brightness(2); /* Electric blue surge */
                transform: translateX(5px) skewX(5deg);
            }
            82% {
                opacity: 0.05;
                filter: drop-shadow(0 0 0px rgba(0,0,0,0)) brightness(0.1);
                transform: translateX(-2px);
            }
            84% {
                opacity: 0.9;
                filter: drop-shadow(0 0 30px rgba(255, 68, 0, 0.8)) brightness(1.8); /* Fire surge */
                transform: translateX(3px) skewX(-2deg);
            }
            85%, 86% {
                opacity: 0;
                filter: drop-shadow(0 0 0px rgba(0,0,0,0)) brightness(0);
            }
            88% {
                opacity: 0.7;
                filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.4)) brightness(1.2);
                transform: translateX(-4px);
            }
            89%, 90% {
                opacity: 0.1;
                filter: drop-shadow(0 0 2px rgba(255, 68, 0, 0.1)) brightness(0.3);
            }
            92% {
                opacity: 0.9;
                filter: drop-shadow(0 0 25px rgba(0, 183, 255, 0.7)) brightness(1.5);
                transform: translateX(2px) skewX(2deg);
            }
            93%, 94% {
                opacity: 0.2;
                filter: drop-shadow(0 0 0px rgba(0,0,0,0)) brightness(0.2);
            }
        }

        /* Interactive Navigation Setup */
        .navigation-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #1a1a1a;
            border: 2px solid #282828;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .action-button i {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 28px;
            text-align: center;
            color: #ff4500; /* Fiery Orange Accent */
        }

        /* Hover states */
        .action-button:hover {
            color: #ffffff;
            background: #222222;
            border-color: #ff4500;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 68, 0, 0.15);
        }

        .action-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <!-- Top Logo with absolute GitHub Pages production link -->
        <div class="logo-container">
            <img src="https://hyalki-del.github.io/babarock/9E3DB23C-F5C1-438B-91E7-323E8FEE34AD_4_5005_c.jpeg" alt="Baba Rock Logo" class="logo-img">
        </div>

        <!-- Links Grid Layout -->
        <nav class="navigation-list">
            <!-- Calendar Navigation -->
            <a href="https://hyalki-del.github.io/babarock/takvim.html" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Takvim</span>
            </a>

            <!-- Playlist Navigation -->
            <a href="https://www.ultimate-guitar.com/user/playlist/view?id=31887695" class="action-button" target="_blank" rel="noopener">
                <i class="fa-solid fa-music"></i>
                <span>Playlist</span>
            </a>
        </nav>
    </div>

</body>
</html>
