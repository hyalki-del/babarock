<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Web Worker Example</title>
</head>
<body>
    <h1>Web Worker Embedded Example</h1>
    <button id="runBtn">Run Task in Background</button>
    <p id="output">Status: Idle</p>

    <script type="module">
        // 1. Define the worker code as a string
        const workerCode = `
            self.onmessage = function(e) {
                console.log('Worker received task with data:', e.data);
                
                // Simulate a heavy background computation
                let result = 0;
                for (let i = 0; i < 1000000000; i++) {
                    result += i;
                }

                // Send the result back to the main page
                self.postMessage('Task finished! Result: ' + result);
            };
        `;

        // 2. Convert the code string into a Blob object
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);

        // 3. Initialize the Web Worker using the Blob URL
        const worker = new Worker(workerUrl);

        // 4. Listen for messages returned from the worker
        worker.onmessage = function(e) {
            document.getElementById('output').textContent = e.data;
        };

        // 5. Trigger worker execution on button click
        document.getElementById('runBtn').addEventListener('click', () => {
            document.getElementById('output').textContent = 'Processing in background...';
            worker.postMessage({ task: 'start' });
        });
    </script>
</body>
</html>
