<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - YouTube Similar Song Advisor</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .advisor-card {
            max-width: 520px;
            width: 100%;
            background: #121212;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffffff;
        }

        .header h1 i {
            color: #ff0000;
        }

        .header p {
            font-size: 0.85rem;
            color: #888888;
            margin-top: 6px;
        }

        /* Seed Banner */
        .seed-box {
            background: #1a1a1a;
            border: 1px solid #282828;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .seed-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff4500;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .seed-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        .seed-artist {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        /* Recommendation List */
        .recommendations-title {
            font-size: 0.9rem;
            color: #888888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .rec-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s ease, background-color 0.25s ease;
        }

        .rec-item:hover {
            border-color: #ff0000;
            background-color: #222222;
        }

        .rec-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex-grow: 1;
        }

        .rec-song-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rec-song-artist {
            font-size: 0.8rem;
            color: #a0a0a0;
            margin-top: 2px;
        }

        .yt-icon {
            color: #ff0000;
            font-size: 1.2rem;
            margin-left: 12px;
            flex-shrink: 0;
        }

        /* Controls */
        .action-btn {
            width: 100%;
            background: #ff4500;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover {
            background: #e03d00;
        }
    </style>
</head>
<body>

    <div class="advisor-card">
        <div class="header">
            <h1><i class="fa-brands fa-youtube"></i> YouTube Suggest Advisor</h1>
            <p>Discovers related songs directly using YouTube search suggestions.</p>
        </div>

        <div class="seed-box">
            <div class="seed-label">Based on your playlist song:</div>
            <div class="seed-title" id="seedTitle">Loading playlist...</div>
            <div class="seed-artist" id="seedArtist">---</div>
        </div>

        <div class="recommendations-title">
            <i class="fa-solid fa-compact-disc"></i> Suggested YouTube Searches:
        </div>

        <ul class="rec-list" id="recList">
            <li class="rec-item"><span class="rec-song-artist">Click the button below to fetch suggestions.</span></li>
        </ul>

        <button class="action-btn" id="findBtn" onclick="generateRecommendations()">
            <i class="fa-solid fa-compass"></i> Find Similar Songs
        </button>
    </div>

    <script>
        let playlist = [];

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                playlist = await res.json();
                if (playlist.length > 0) {
                    generateRecommendations();
                }
            } catch (err) {
                console.error(err);
                document.getElementById("seedTitle").textContent = "Error loading playlist";
            }
        }

        function cleanText(text) {
            return text
                .replace(/\(.*?\)|\[.*?\]/g, '')
                .replace(/-(.*)(Remaster|Live|Deluxe|Version).*/i, '')
                .trim();
        }

        // Fetches YouTube search auto-suggestions via CORS proxy
        async function fetchYTSuggestions(query) {
            try {
                const targetUrl = `https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${encodeURIComponent(query)}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const res = await fetch(proxyUrl);
                const data = await res.json();
                
                if (data.contents) {
                    const parsed = JSON.parse(data.contents);
                    return parsed[1] || [];
                }
            } catch (e) {
                console.warn("Proxy suggestion error:", e);
            }
            return [];
        }

        async function generateRecommendations() {
            if (!playlist || playlist.length === 0) return;

            const recList = document.getElementById("recList");
            const seedTitle = document.getElementById("seedTitle");
            const seedArtist = document.getElementById("seedArtist");

            // Pick random seed from playlist
            const seed = playlist[Math.floor(Math.random() * playlist.length)];
            const cleanTitleStr = cleanText(seed.title);
            const cleanArtistStr = cleanText(seed.artist);

            seedTitle.textContent = seed.title;
            seedArtist.textContent = seed.artist;

            recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">Querying YouTube search suggestions...</span></li>`;

            // Try two search query patterns
            const primaryQuery = `${cleanArtistStr} ${cleanTitleStr} similar songs`;
            const fallbackQuery = `songs like ${cleanArtistStr}`;

            let suggestions = await fetchYTSuggestions(primaryQuery);

            if (suggestions.length < 3) {
                const secondary = await fetchYTSuggestions(fallbackQuery);
                suggestions = [...suggestions, ...secondary];
            }

            // Remove duplicate phrases
            const uniqueSuggestions = [...new Set(suggestions)];

            // Filter out exact match query inputs
            const filtered = uniqueSuggestions.filter(item => {
                const lower = item.toLowerCase();
                return !lower.includes("similar songs") && !lower.includes("songs like");
            });

            const finalResults = filtered.length > 0 ? filtered : uniqueSuggestions;

            renderResults(finalResults, cleanArtistStr);
        }

        function renderResults(suggestions, artistName) {
            const recList = document.getElementById("recList");
            recList.innerHTML = "";

            if (suggestions.length === 0) {
                recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">No suggestions returned. Try another song!</span></li>`;
                return;
            }

            suggestions.slice(0, 5).forEach(phrase => {
                const query = encodeURIComponent(phrase);
                const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;

                const li = document.createElement("li");
                li.innerHTML = `
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="rec-item" title="Open YouTube Search">
                        <div class="rec-info">
                            <span class="rec-song-title">${phrase}</span>
                            <span class="rec-song-artist">Search on YouTube</span>
                        </div>
                        <i class="fa-brands fa-youtube yt-icon"></i>
                    </a>
                `;
                recList.appendChild(li);
            });
        }

        init();
    </script>

</body>
</html>
