<script>
        const PLAYLIST_URL = "https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r";
        // Switched to a faster and more reliable CORS proxy
        const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent(PLAYLIST_URL);

        async function fetchPlaylist() {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");

            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error("Proxy connection failed");

                const htmlText = await response.text();

                // Extract data directly from the HTML source string
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");

                const storeDiv = doc.querySelector(".js-store");
                if (!storeDiv) throw new Error("Data container missing");

                const jsonData = JSON.parse(storeDiv.getAttribute("data-content"));
                const items = jsonData.store.page.data.playlist.items;

                renderList(items);

            } catch (err) {
                console.warn("Live fetch failed, fallback active:", err);
                // Fallback: If Ultimate Guitar blocks automated scraping, load standard playlist
                loadFallbackPlaylist();
            }
        }

        function renderList(items) {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");

            listElement.innerHTML = "";
            countElement.textContent = `${items.length} Songs`;

            items.forEach((item, index) => {
                const li = document.createElement("li");
                li.className = "song-item";
                li.innerHTML = `
                    <span class="song-number">${index + 1}</span>
                    <div class="song-info">
                        <span class="song-title">${item.song_name || item.title}</span>
                        <span class="song-artist">${item.artist_name || item.artist}</span>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        function loadFallbackPlaylist() {
            // Backup static array so your page never hangs on "Loading..."
            const backupSongs = [
                { song_name: "Şehirler", artist_name: "Baba Rock" },
                { song_name: "Playlist Tabs", artist_name: "Ultimate Guitar" }
            ];
            renderList(backupSongs);
        }

        fetchPlaylist();
    </script>
