<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock</title>
    <!-- Font Awesome for crisp icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset & Dark Metal Theme Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden; /* Prevents horizontal scroll from glowing blur */
        }

        /* Knight Rider LED Strip Base Styles */
        .led-strip {
            position: fixed;
            left: 0;
            width: 100%;
            height: 6px;
            background: #110000; /* Dark background for the housing */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 9999;
        }

        .led-strip-top {
            top: 0;
            border-bottom: 1px solid #220000;
        }

        .led-strip-bottom {
            bottom: 0;
            border-top: 1px solid #220000;
        }

        /* The moving scanner light */
        .led-strip::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 120px; /* Width of the scanning pulse */
            background: linear-gradient(to right, transparent, #ff0000 30%, #ff6666 50%, #ff0000 70%, transparent);
            box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            animation: knightRider 2s infinite ease-in-out;
        }

        /* Knight Rider Scanner Animation */
        @keyframes knightRider {
            0% {
                left: -120px;
            }
            50% {
                left: 100%;
                transform: translateX(-100%);
            }
            100% {
                left: -120px;
            }
        }

        /* Container Card - Strict Single Column Constraints */
        .welcome-card {
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: #121212;
            padding: 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Added just to close out the card style cleanly */
        }
    </style>
</head>
<body>

    <!-- Knight Rider LED Strips -->
    <div class="led-strip led-strip-top"></div>
    <div class="led-strip led-strip-bottom"></div>

    <!-- Your existing card layout continues below -->
    <div class="welcome-card">
        <h1>Baba Rock</h1>
        <!-- Your card contents go here -->
    </div>

</body>
</html>
