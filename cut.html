<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Playlist</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Reset & Dark Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .playlist-card {
            max-width: 500px;
            width: 100%;
            background: #121212;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
        }

        .header h1 i {
            color: #ff4500;
        }

        .song-count {
            font-size: 0.85rem;
            color: #888;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #282828;
        }

        /* Song List Styling */
        .song-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .song-list::-webkit-scrollbar {
            width: 6px;
        }
        .song-list::-webkit-scrollbar-thumb {
            background: #282828;
            border-radius: 3px;
        }

        .song-item {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 12px 16px;
            border-radius: 10px;
            transition: border-color 0.2s ease;
        }

        .song-item:hover {
            border-color: #ff4500;
        }

        .song-number {
            font-size: 0.85rem;
            color: #ff4500;
            font-weight: bold;
            width: 30px;
            flex-shrink: 0;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .song-title {
            font-weight: 600;
            font-size: 1rem;
            color: #f5f5f5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-top: 2px;
        }

        /* Loading / Error States */
        .status-msg {
            text-align: center;
            padding: 30px 0;
            color: #a0a0a0;
            font-size: 0.95rem;
        }

        .status-msg i {
            margin-right: 8px;
            color: #ff4500;
        }
    </style>
</head>
<body>

    <div class="playlist-card">
        <div class="header">
            <h1><i class="fa-solid fa-music"></i> Playlist</h1>
            <span class="song-count" id="songCount">Loading...</span>
        </div>

        <ul class="song-list" id="songList">
            <div class="status-msg"><i class="fa-solid fa-circle-notch fa-spin"></i> Songs are loading...</div>
        </ul>
    </div>

    <script>
        const PLAYLIST_URL = "https://www.ultimate-guitar.com/user/playlist/shared?h=N4oafAvw08YnD1Pep-gUFb1r";
        // Public CORS proxy to allow client-side scraping
        const PROXY_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent(PLAYLIST_URL);

        async function fetchPlaylist() {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");

            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();

                // Parse the returned HTML page string
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, "text/html");

                // Locate the div holding Ultimate Guitar's JSON data
                const storeDiv = doc.querySelector(".js-store");
                if (!storeDiv) throw new Error("Data element not found.");

                const jsonData = JSON.parse(storeDiv.getAttribute("data-content"));
                const items = jsonData.store.page.data.playlist.items;

                // Clear loading state
                listElement.innerHTML = "";
                countElement.textContent = `${items.length} Songs`;

                // Render each song item
                items.forEach((item, index) => {
                    const li = document.createElement("li");
                    li.className = "song-item";
                    li.innerHTML = `
                        <span class="song-number">${index + 1}</span>
                        <div class="song-info">
                            <span class="song-title">${item.song_name}</span>
                            <span class="song-artist">${item.artist_name}</span>
                        </div>
                    `;
                    listElement.appendChild(li);
                });

            } catch (err) {
                console.error(err);
                listElement.innerHTML = `<div class="status-msg" style="color: #ff3b30;"><i class="fa-solid fa-triangle-exclamation"></i> Failed to load playlist data.</div>`;
                countElement.textContent = "Error";
            }
        }

        fetchPlaylist();
    </script>

</body>
</html>
