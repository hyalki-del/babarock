<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Genre & Style Advisor</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .advisor-card {
            max-width: 520px;
            width: 100%;
            background: #121212;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffffff;
        }

        .header h1 i {
            color: #ff4500;
        }

        .header p {
            font-size: 0.85rem;
            color: #888888;
            margin-top: 6px;
        }

        /* Seed Banner */
        .seed-box {
            background: #1a1a1a;
            border: 1px solid #282828;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .seed-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff4500;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .seed-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }

        .seed-artist {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .genre-tag {
            display: inline-block;
            margin-top: 8px;
            background: #2a1810;
            color: #ff8555;
            border: 1px solid #ff4500;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        /* Recommendation List */
        .recommendations-title {
            font-size: 0.9rem;
            color: #888888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .rec-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s ease, background-color 0.25s ease;
        }

        .rec-item:hover {
            border-color: #ff4500;
            background-color: #222222;
        }

        .rec-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex-grow: 1;
        }

        .rec-song-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rec-song-artist {
            font-size: 0.8rem;
            color: #a0a0a0;
            margin-top: 2px;
        }

        .yt-icon {
            color: #ff0000;
            font-size: 1.2rem;
            margin-left: 12px;
            flex-shrink: 0;
        }

        /* Controls */
        .action-btn {
            width: 100%;
            background: #ff4500;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover {
            background: #e03d00;
        }
    </style>
</head>
<body>

    <div class="advisor-card">
        <div class="header">
            <h1><i class="fa-solid fa-guitar"></i> Style & Genre Advisor</h1>
            <p>Discovers other artists matching the genre and era of your track.</p>
        </div>

        <div class="seed-box">
            <div class="seed-label">Based on your playlist song:</div>
            <div class="seed-title" id="seedTitle">Loading playlist...</div>
            <div class="seed-artist" id="seedArtist">---</div>
            <div id="genreContainer"></div>
        </div>

        <div class="recommendations-title">
            <i class="fa-solid fa-compact-disc"></i> Similar Style & Era Tracks:
        </div>

        <ul class="rec-list" id="recList">
            <li class="rec-item"><span class="rec-song-artist">Click below to find similar style tracks.</span></li>
        </ul>

        <button class="action-btn" id="findBtn" onclick="generateRecommendations()">
            <i class="fa-solid fa-compass"></i> Find Style-Matched Songs
        </button>
    </div>

    <script>
        let playlist = [];

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                playlist = await res.json();
                if (playlist && playlist.length > 0) {
                    generateRecommendations();
                } else {
                    document.getElementById("seedTitle").textContent = "Playlist is empty";
                }
            } catch (err) {
                console.error("Failed to load playlist.json", err);
                document.getElementById("seedTitle").textContent = "Error loading playlist.json";
            }
        }

        function cleanText(text) {
            if (!text) return "";
            return String(text)
                .replace(/\(.*?\)|\[.*?\]/g, '')
                .replace(/-(.*)(Remaster|Live|Deluxe|Version).*/i, '')
                .trim();
        }

        async function generateRecommendations() {
            if (!playlist || playlist.length === 0) return;

            const recList = document.getElementById("recList");
            const seedTitle = document.getElementById("seedTitle");
            const seedArtist = document.getElementById("seedArtist");
            const genreContainer = document.getElementById("genreContainer");

            // Pick a random song from playlist
            const seed = playlist[Math.floor(Math.random() * playlist.length)];
            const cleanArtistStr = cleanText(seed.artist);

            seedTitle.textContent = seed.title;
            seedArtist.textContent = seed.artist;
            genreContainer.innerHTML = "";

            recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">Analyzing genre and era tags...</span></li>`;

            try {
                // 1. Fetch artist details from MusicBrainz to get genre tags
                const mbUrl = `https://musicbrainz.org/ws/2/artist/?query=artist:${encodeURIComponent(cleanArtistStr)}&fmt=json`;
                const mbRes = await fetch(mbUrl);
                const mbData = await mbRes.json();

                let detectedGenre = "rock";
                if (mbData.artists && mbData.artists.length > 0) {
                    const artistObj = mbData.artists[0];
                    if (artistObj.tags && artistObj.tags.length > 0) {
                        // Pick highest-voted genre tag
                        detectedGenre = artistObj.tags.sort((a, b) => b.count - a.count)[0].name;
                    }
                }

                genreContainer.innerHTML = `<span class="genre-tag"><i class="fa-solid fa-tag"></i> ${detectedGenre}</span>`;

                // 2. Query MusicBrainz for OTHER bands under the same genre tag
                const genreQueryUrl = `https://musicbrainz.org/ws/2/artist/?query=tag:${encodeURIComponent(detectedGenre)}&fmt=json&limit=15`;
                const genreRes = await fetch(genreQueryUrl);
                const genreData = await genreRes.json();

                let matchedArtists = (genreData.artists || [])
                    .map(a => a.name)
                    // Exclude the current band from seed
                    .filter(name => name.toLowerCase() !== cleanArtistStr.toLowerCase());

                if (matchedArtists.length === 0) {
                    matchedArtists = ["Deep Purple", "Black Sabbath", "Judas Priest", "Rainbow", "Motorhead"];
                }

                // Pick 3-5 random bands from matching genre
                const selectedBands = matchedArtists.sort(() => 0.5 - Math.random()).slice(0, 5);

                // 3. Get top tracks for those genre-matched bands via iTunes API
                let recTracks = [];
                for (let band of selectedBands) {
                    try {
                        const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(band)}&entity=song&limit=1`;
                        const iRes = await fetch(itunesUrl);
                        const iData = await iRes.json();

                        if (iData.results && iData.results.length > 0) {
                            recTracks.push({
                                title: iData.results[0].trackName,
                                artist: band
                            });
                        }
                    } catch (e) {
                        console.warn("Failed fetching track for band", band);
                    }
                }

                renderTracks(recTracks);

            } catch (err) {
                console.error("Style matching error:", err);
                recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">Unable to fetch genre suggestions right now.</span></li>`;
            }
        }

        function renderTracks(tracks) {
            const recList = document.getElementById("recList");
            recList.innerHTML = "";

            if (!tracks || tracks.length === 0) {
                recList.innerHTML = `<li class="rec-item"><span class="rec-song-artist">No matching tracks found. Try again!</span></li>`;
                return;
            }

            tracks.forEach(t => {
                const query = encodeURIComponent(`${t.title} ${t.artist}`);
                const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;

                const li = document.createElement("li");
                li.innerHTML = `
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="rec-item" title="Listen on YouTube">
                        <div class="rec-info">
                            <span class="rec-song-title">${t.title}</span>
                            <span class="rec-song-artist">${t.artist}</span>
                        </div>
                        <i class="fa-brands fa-youtube yt-icon"></i>
                    </a>
                `;
                recList.appendChild(li);
            });
        }

        window.onload = init;
    </script>

</body>
</html>
