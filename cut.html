<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Şarkı Seçici</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4500;
            --primary-hover: #e03d00;
            --card-bg: #121212;
            --surface: #1a1a1a;
            --border: #282828;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 69, 0, 0.15);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Navigation & Slider Tabs */
        .header {
            padding: 20px 20px 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-main);
        }

        .header h1 i { color: var(--primary); }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            background: #080808;
            padding: 5px;
            border-radius: 30px;
            border: 1px solid #222;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.4);
        }

        /* Viewport & Slider Track */
        .slider-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .slider-track {
            display: flex;
            width: 300%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-panel {
            width: 33.333%;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
        }

        /* Action Trigger Buttons */
        .trigger-btn {
            margin-top: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trigger-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* ==================== 1. REALISTIC SINGLE-REEL SLOT MACHINE ==================== */
        .slot-machine {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .slot-frame {
            background: linear-gradient(145deg, #1f1f1f, #080808);
            border: 4px solid #333;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9), 0 0 15px rgba(255,69,0,0.2);
            overflow: hidden;
            height: 120px;
            width: 260px;
            position: relative;
        }

        /* Glass / Cylinder Overlay Effect */
        .slot-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.7) 0%,
                rgba(0,0,0,0) 25%,
                rgba(0,0,0,0) 75%,
                rgba(0,0,0,0.7) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        /* Red Selection Line */
        .slot-frame::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            transform: translateY(-50%);
            z-index: 4;
            pointer-events: none;
        }

        .single-reel {
            width: 100%;
            height: 100%;
            background: #ffffff; /* White Spinner */
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
        }

        .reel-container {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            width: 100%;
            transition: top 0.05s linear;
        }

        .reel-item {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 15px;
            border-bottom: 1px dashed #ccc;
        }

        .reel-item .title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #000000; /* Black Font */
            line-height: 1.2;
            word-break: break-word;
        }

        .reel-item .artist {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555555;
            margin-top: 4px;
        }

        /* Lever Mechanism */
        .arm-container {
            width: 30px;
            height: 120px;
            position: relative;
            cursor: pointer;
        }

        .arm-base {
            width: 20px;
            height: 20px;
            background: #444;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            left: 5px;
        }

        .arm-stick {
            width: 8px;
            height: 70px;
            background: linear-gradient(to right, #888, #fff, #666);
            position: absolute;
            bottom: 20px;
            left: 11px;
            transform-origin: bottom center;
            transition: transform 0.3s ease;
            border-radius: 4px;
        }

        .arm-knob {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ff6b35, #d32f2f);
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .arm-container.pulled .arm-stick {
            transform: rotateX(150deg) scaleY(0.6);
        }

        /* ==================== 2. WHEEL OF FORTUNE (MAGNIFIER LENS) ==================== */
        .wheel-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#wheelCanvas {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px var(--primary);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid var(--primary);
            z-index: 12;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .wheel-magnifier {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            border: 3px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.4);
            z-index: 11;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .magnifier-text {
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 0 6px #000, 0 0 2px #000;
            padding: 2px 4px;
            word-break: break-word;
            line-height: 1.1;
        }

        .wheel-center-cap {
            position: absolute;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle, #222 0%, #000 100%);
            border: 3px solid var(--primary);
            border-radius: 50%;
            z-index: 5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* ==================== 3. VINYL TURNTABLE (TRAVELING NEEDLE ARM) ==================== */
        .turntable {
            width: 250px;
            height: 250px;
            background: #181818;
            border-radius: 16px;
            border: 2px solid #333;
            position: relative;
            box-shadow: inset 0 0 10px #000, 0 8px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .vinyl-record {
            width: 210px;
            height: 210px;
            background: repeating-radial-gradient(
                #111,
                #111 2px,
                #222 3px,
                #111 4px
            );
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            transition: transform 0.1s linear;
        }

        .vinyl-record.spinning {
            animation: spinRecord 1s linear infinite;
        }

        @keyframes spinRecord {
            100% { transform: rotate(360deg); }
        }

        .record-label {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #ff4500 0%, #b71c1c 100%);
            border-radius: 50%;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 4px;
            text-align: center;
        }

        .record-label-title {
            font-size: 0.65rem;
            font-weight: bold;
            line-height: 1.1;
            word-break: break-word;
        }

        .record-label-artist {
            font-size: 0.5rem;
            opacity: 0.8;
            margin-top: 2px;
        }

        .tonearm-pivot {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 24px;
            height: 24px;
            background: #444;
            border-radius: 50%;
            border: 2px solid #666;
            z-index: 10;
        }

        .tonearm {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 10px;
            height: 110px;
            pointer-events: none;
            transform-origin: 5px 0px;
            transition: transform 0.1s linear;
            transform: rotate(-35deg);
            z-index: 10;
        }

        .tonearm-stick {
            width: 4px;
            height: 95px;
            background: linear-gradient(to right, #ccc, #fff, #aaa);
            position: absolute;
            left: 3px;
            border-radius: 2px;
        }

        .tonearm-head {
            width: 12px;
            height: 22px;
            background: var(--primary);
            position: absolute;
            bottom: 0px;
            left: -1px;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        /* YouTube Footer Link */
        .yt-container {
            padding: 0 20px 20px 20px;
        }

        .yt-btn {
            width: 100%;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .yt-btn i { color: #ff0000; }

        .yt-btn:hover:not(.disabled) {
            background: #282828;
            border-color: var(--primary);
        }

        .yt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fa-solid fa-guitar"></i> Baba Rock</h1>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchSlide(0)">
                    <i class="fa-solid fa-cubes"></i> Slot
                </button>
                <button class="tab-btn" onclick="switchSlide(1)">
                    <i class="fa-solid fa-dharmachakra"></i> Wheel
                </button>
                <button class="tab-btn" onclick="switchSlide(2)">
                    <i class="fa-solid fa-compact-disc"></i> Vinyl
                </button>
            </div>
        </div>

        <!-- Slider Viewport -->
        <div class="slider-viewport" id="sliderViewport">
            <div class="slider-track" id="sliderTrack">
                
                <!-- PANEL 1: SINGLE-ROW REALISTIC SLOT MACHINE -->
                <div class="slide-panel">
                    <div class="slot-machine">
                        <div class="slot-frame">
                            <div class="single-reel">
                                <div class="reel-container" id="singleReel"></div>
                            </div>
                        </div>
                        <div class="arm-container" id="slotArm" onclick="pullSlotLever()">
                            <div class="arm-stick">
                                <div class="arm-knob"></div>
                            </div>
                            <div class="arm-base"></div>
                        </div>
                    </div>
                    <button class="trigger-btn" onclick="pullSlotLever()">
                        <i class="fa-solid fa-sliders"></i> PULL LEVER
                    </button>
                </div>

                <!-- PANEL 2: WHEEL OF FORTUNE WITH MAGNIFIER -->
                <div class="slide-panel">
                    <div class="wheel-wrapper">
                        <div class="wheel-pointer"></div>
                        <div class="wheel-magnifier">
                            <div class="magnifier-text" id="magnifierText">SPIN ME!</div>
                        </div>
                        <canvas id="wheelCanvas" width="260" height="260"></canvas>
                        <div class="wheel-center-cap" onclick="spinWheel()">SPIN</div>
                    </div>
                    <button class="trigger-btn" onclick="spinWheel()">
                        <i class="fa-solid fa-rotate-right"></i> SPIN WHEEL
                    </button>
                </div>

                <!-- PANEL 3: VINYL TURNTABLE WITH TRAVELING ARM -->
                <div class="slide-panel">
                    <div class="turntable" onclick="playVinyl()">
                        <div class="vinyl-record" id="vinylRecord">
                            <div class="record-label">
                                <div class="record-label-title" id="vinylTitle">BABA ROCK</div>
                                <div class="record-label-artist" id="vinylArtist">Select Song</div>
                            </div>
                        </div>
                        <div class="tonearm-pivot"></div>
                        <div class="tonearm" id="tonearm">
                            <div class="tonearm-stick"></div>
                            <div class="tonearm-head"></div>
                        </div>
                    </div>
                    <button class="trigger-btn" onclick="playVinyl()">
                        <i class="fa-solid fa-play"></i> DROP NEEDLE
                    </button>
                </div>

            </div>
        </div>

        <!-- YouTube Link Footer -->
        <div class="yt-container">
            <a href="#" target="_blank" rel="noopener noreferrer" class="yt-btn disabled" id="ytBtn">
                <i class="fa-brands fa-youtube"></i> Search on YouTube
            </a>
        </div>
    </div>

    <script>
        // Fallback playlist data ensuring instant standalone operation
        const defaultPlaylist = [
            { title: "Cambaz", artist: "mor ve ötesi" },
            { title: "Bir Derdim Var", artist: "mor ve ötesi" },
            { title: "Paramparça", artist: "Teoman" },
            { title: "Köprüaltı", artist: "duman" },
            { title: "Resimdeki Gözyaşları", artist: "Cem Karaca" },
            { title: "Islak Islak", artist: "Barış Akarsu" },
            { title: "Dönence", artist: "Barış Manço" },
            { title: "Araf", artist: "manga" }
        ];

        let playlist = [];
        let isBusy = false;
        let currentSlide = 0;

        // Wheel State
        let wheelAngle = 0;
        let wheelSpinning = false;

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                if (!res.ok) throw new Error("Local json fetch failed");
                playlist = await res.json();
            } catch (err) {
                playlist = defaultPlaylist;
            }
            initSlotMachine();
            drawWheel();
            setupTouchSwipe();
        }

        /* ================= NAVIGATION SLIDER ================= */
        function switchSlide(index) {
            if (isBusy) return;
            currentSlide = index;
            document.getElementById("sliderTrack").style.transform = `translateX(-${index * 33.333}%)`;
            
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
        }

        function setupTouchSwipe() {
            const viewport = document.getElementById('sliderViewport');
            let startX = 0;

            viewport.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
            viewport.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentSlide < 2) switchSlide(currentSlide + 1);
                    if (diff < 0 && currentSlide > 0) switchSlide(currentSlide - 1);
                }
            }, {passive: true});
        }

        /* ================= YOUTUBE LINK UPDATER ================= */
        function updateYouTubeBtn(song) {
            const ytBtn = document.getElementById("ytBtn");
            const query = encodeURIComponent(`${song.title} ${song.artist}`);
            ytBtn.href = `https://www.youtube.com/results?search_query=${query}`;
            ytBtn.classList.remove("disabled");
        }

        function getRandomSong() {
            return playlist[Math.floor(Math.random() * playlist.length)];
        }

        /* ================= 1. SINGLE-REEL REALISTIC SLOT MACHINE ================= */
        function initSlotMachine() {
            const reel = document.getElementById('singleReel');
            // White reel with black fonts, 1 row per song
            reel.innerHTML = playlist.map(song => `
                <div class="reel-item">
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                </div>
            `).join('');
        }

        function pullSlotLever() {
            if (isBusy) return;
            isBusy = true;

            const arm = document.getElementById('slotArm');
            arm.classList.add('pulled');
            setTimeout(() => arm.classList.remove('pulled'), 400);

            let spins = 0;
            const maxSpins = 25;
            const finalSong = getRandomSong();
            const reel = document.getElementById('singleReel');

            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * playlist.length);
                reel.style.top = `-${randomIndex * 100}px`;

                spins++;
                if (spins >= maxSpins) {
                    clearInterval(interval);
                    
                    const targetIndex = playlist.findIndex(s => s.title === finalSong.title);
                    const validIndex = targetIndex >= 0 ? targetIndex : 0;
                    
                    reel.style.top = `-${validIndex * 100}px`;

                    updateYouTubeBtn(finalSong);
                    isBusy = false;
                }
            }, 70);
        }

        /* ================= 2. WHEEL OF FORTUNE (MAGNIFIER LENS) ================= */
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const totalSongs = playlist.length;
            if (totalSongs === 0) return;

            const sliceAngle = (2 * Math.PI) / totalSongs;
            ctx.clearRect(0, 0, 260, 260);

            for (let i = 0; i < totalSongs; i++) {
                const angle = wheelAngle + i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#ff4500' : '#1f1f1f';
                ctx.moveTo(130, 130);
                ctx.arc(130, 130, 125, angle, angle + sliceAngle);
                ctx.lineTo(130, 130);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(130, 130);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(playlist[i].title.substring(0, 12), 115, 3);
                ctx.restore();
            }

            updateMagnifierText(sliceAngle);
        }

        function updateMagnifierText(sliceAngle) {
            const totalSongs = playlist.length;
            if (totalSongs === 0) return;

            let normalizedAngle = (Math.PI / 2 - (wheelAngle % (2 * Math.PI))) % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

            const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % totalSongs;
            const currentSong = playlist[selectedIndex];

            if (currentSong) {
                document.getElementById('magnifierText').textContent = currentSong.title;
            }
        }

        function spinWheel() {
            if (isBusy || wheelSpinning) return;
            isBusy = true;
            wheelSpinning = true;

            let velocity = Math.random() * 0.25 + 0.35;
            const friction = 0.985;

            function animate() {
                velocity *= friction;
                wheelAngle += velocity;
                drawWheel();

                if (velocity > 0.0015) {
                    requestAnimationFrame(animate);
                } else {
                    wheelSpinning = false;
                    isBusy = false;

                    const sliceAngle = (2 * Math.PI) / playlist.length;
                    let normalizedAngle = (Math.PI / 2 - (wheelAngle % (2 * Math.PI))) % (2 * Math.PI);
                    if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
                    
                    const finalIndex = Math.floor(normalizedAngle / sliceAngle) % playlist.length;
                    const selectedSong = playlist[finalIndex];

                    updateYouTubeBtn(selectedSong);
                }
            }
            requestAnimationFrame(animate);
        }

        /* ================= 3. VINYL TURNTABLE (TRAVELING NEEDLE ARM) ================= */
        function playVinyl() {
            if (isBusy) return;
            isBusy = true;

            const record = document.getElementById('vinylRecord');
            const tonearm = document.getElementById('tonearm');
            const selectedSong = getRandomSong();

            record.classList.add('spinning');

            let currentArmAngle = -35;
            const startTrackAngle = -10;
            const endTrackAngle = 10;
            const duration = 2800;
            const startTime = performance.now();

            function animateTonearm(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                if (progress < 0.2) {
                    const p = progress / 0.2;
                    currentArmAngle = -35 + p * (startTrackAngle - (-35));
                } else if (progress < 0.85) {
                    const p = (progress - 0.2) / 0.65;
                    currentArmAngle = startTrackAngle + p * (endTrackAngle - startTrackAngle);
                } else {
                    const p = (progress - 0.85) / 0.15;
                    currentArmAngle = endTrackAngle + p * (-35 - endTrackAngle);
                }

                tonearm.style.transform = `rotate(${currentArmAngle}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animateTonearm);
                } else {
                    record.classList.remove('spinning');
                    
                    // Display song inside vinyl label directly
                    document.getElementById('vinylTitle').textContent = selectedSong.title;
                    document.getElementById('vinylArtist').textContent = selectedSong.artist;

                    updateYouTubeBtn(selectedSong);
                    isBusy = false;
                }
            }

            requestAnimationFrame(animateTonearm);
        }

        window.onload = init;
    </script>
</body>
