<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABAROCK TAKVIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .apple-card { background-color: #1c1c1e; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Dotted KITT Red LED Loader styles */
        .kitty-led {
            width: 120px;
            height: 10px;
            background-color: #0c0c0e;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }
        .kitty-led::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-image: radial-gradient(circle, #ff0033 35%, transparent 45%);
            background-size: 12px 10px;
            background-repeat: repeat-x;
            filter: drop-shadow(0 0 3px #ff0033) drop-shadow(0 0 6px #ff0000);
            animation: kittyMarquee 0.6s linear infinite;
        }
        @keyframes kittyMarquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-12px); } /* Perfect loop match with background-size width */
        }
    </style>
</head>
<body class="text-[#f5f5f7] p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="apple-card rounded-2xl p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 shadow-sm">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-white">Sahne Senkronizasyonu</h1>
                <p class="text-[#86868b] text-sm mt-1">Meşgul olduğunuz günleri seçin. Kaydedilmesi için "Kaydet ve Güncelle" butonuna basın.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-[#86868b]">Kullanıcı:</span>
                    <select id="userSelect" class="bg-[#2c2c2e] border border-white/10 rounded-xl px-4 py-2.5 text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                        <option value="serkan">SERKAN</option>
                        <option value="ilker">ILKER</option>
                        <option value="hasan">HASAN</option>
                        <option value="osman">OSMAN</option>
                        <option value="oguzhan">OGUZHAN</option>
                    </select>
                </div>
                
                <!-- The action button now contains a clean container slot for the state transition -->
                <button id="saveBtn" class="bg-[#0071e3] hover:bg-[#0077ed] text-white text-sm px-5 py-2.5 rounded-xl font-medium tracking-wide transition-all shadow-md flex items-center justify-center gap-3 min-w-[160px] h-[42px]">
                    <span id="btnText">Kaydet ve Güncelle</span>
                    <span id="btnLoader" class="hidden"><div class="kitty-led"></div></span>
                </button>
            </div>
        </header>

    </div>

    <script>
        // Demonstration Script to show how the UI state toggles cleanly 
        const saveBtn = document.getElementById('saveBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        saveBtn.addEventListener('click', () => {
            // Step 1: Enter Loading State
            saveBtn.disabled = true;
            btnText.textContent = "Kaydediliyor...";
            btnLoader.classList.remove('hidden');

            // Step 2: Simulating API Save Roundtrip (2 seconds)
            setTimeout(() => {
                // Step 3: Return to Normal State
                saveBtn.disabled = false;
                btnText.textContent = "Kaydet ve Güncelle";
                btnLoader.classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
