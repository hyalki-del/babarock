<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Playlist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0c0c0c;
            background: radial-gradient(circle, #161616 0%, #070707 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .playlist-card {
            max-width: 480px;
            width: 100%;
            background: #121212;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 15px;
        }
        .header h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 12px; color: #ffffff; }
        .header h1 i { color: #ff4500; }
        .song-count {
            font-size: 0.85rem;
            color: #888888;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #282828;
        }
        .song-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .song-list::-webkit-scrollbar { width: 6px; }
        .song-list::-webkit-scrollbar-thumb { background: #282828; border-radius: 3px; }
        
        .song-item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 12px 16px;
            border-radius: 10px;
            transition: border-color 0.25s ease, background-color 0.25s ease, transform 0.15s ease;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .song-item-card:hover {
            border-color: #ff4500;
            background-color: #222222;
            transform: translateY(-1px);
        }
        .song-left { display: flex; align-items: center; min-width: 0; flex-grow: 1; }
        .song-number { font-size: 0.85rem; color: #ff4500; font-weight: bold; width: 28px; flex-shrink: 0; }
        .song-info { display: flex; flex-direction: column; min-width: 0; flex-grow: 1; }
        .song-title { font-weight: 600; font-size: 0.95rem; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.8rem; color: #a0a0a0; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .actions-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .key-badge {
            font-size: 0.7rem;
            font-weight: 700;
            color: #ff4500;
            background: #121212;
            border: 1px solid #ff4500;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .yt-icon { color: #ff0000; font-size: 1.2rem; flex-shrink: 0; text-decoration: none; padding: 4px; }

        /* Modal Popup */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #121212;
            border: 1px solid #ff4500;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(255, 69, 0, 0.2);
        }
        .modal-title { font-size: 1rem; margin-bottom: 8px; color: #ffffff; }
        .modal-song-name { font-size: 0.85rem; color: #ff4500; margin-bottom: 16px; word-break: break-all; }
        .modal-input {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #282828;
            color: #ffffff;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }
        .modal-input:focus { border-color: #ff4500; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel, .btn-save {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }
        .btn-cancel { background: #282828; color: #cccccc; }
        .btn-save { background: #ff4500; color: #ffffff; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="playlist-card">
        <div class="header">
            <h1><i class="fa-solid fa-music"></i> Playlist</h1>
            <span class="song-count" id="songCount">Loading...</span>
        </div>
        <ul class="song-list" id="songList"></ul>
    </div>

    <!-- Edit Key Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <div class="modal-title">Edit Song Key</div>
            <div class="modal-song-name" id="modalSongName"></div>
            <input type="text" class="modal-input" id="modalKeyInput" placeholder="e.g. Am, Em, F#m" />
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="saveBtn" onclick="submitKeyUpdate()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR DEPLOYED WEB APP URL HERE
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyrIg2w1eHU2fruqixpNKLCtvTtgZ1N4inHOx5g8z_DiAR8W9NiZkK0Cf0D106HHyrp/exec";
        
        let playlistData = [];
        let keyMapData = {};
        let activeEditSong = null;
        let pressTimer = null;

        function normalizeTitle(str) {
            return str
                .toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]/g, "");
        }

        async function loadPlaylist() {
            const countElement = document.getElementById("songCount");

            try {
                const timestamp = new Date().getTime();
                const [resPlaylist, resKeys] = await Promise.all([
                    fetch(`./playlist.json?t=${timestamp}`),
                    fetch(`${GOOGLE_SHEET_API_URL}?t=${timestamp}`)
                ]);

                playlistData = await resPlaylist.json();
                keyMapData = await resKeys.json();

                renderUI();
            } catch (err) {
                console.error(err);
                countElement.textContent = "Error";
            }
        }

        function renderUI() {
            const listElement = document.getElementById("songList");
            const countElement = document.getElementById("songCount");

            const normalizedKeyMap = {};
            for (const [title, key] of Object.entries(keyMapData)) {
                normalizedKeyMap[normalizeTitle(title)] = key;
            }

            listElement.innerHTML = "";
            countElement.textContent = `${playlistData.length} Songs`;

            playlistData.forEach((item, index) => {
                const li = document.createElement("li");
                const query = encodeURIComponent(`${item.title} ${item.artist}`);
                const youtubeUrl = `https://www.youtube.com/results?search_query=${query}`;
                
                const normTitle = normalizeTitle(item.title);
                const detectedKey = normalizedKeyMap[normTitle] || item.key || null;
                const keyBadgeHtml = (detectedKey && detectedKey !== 'N/A') 
                    ? `<span class="key-badge">${detectedKey}</span>` 
                    : '';

                li.className = "song-item-card";

                // Attach 2-second hold listener
                attachLongPressListener(li, item, detectedKey);

                li.innerHTML = `
                    <div class="song-left">
                        <span class="song-number">${index + 1}</span>
                        <div class="song-info">
                            <span class="song-title">${item.title}</span>
                            <span class="song-artist">${item.artist}</span>
                        </div>
                    </div>
                    <div class="actions-right">
                        ${keyBadgeHtml}
                        <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="fa-brands fa-youtube yt-icon" title="Listen on YouTube" onclick="event.stopPropagation();"></a>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        function attachLongPressListener(element, item, currentKey) {
            const startPress = (e) => {
                if (e.target.closest('.yt-icon')) return;

                pressTimer = setTimeout(() => {
                    openModal(item, currentKey);
                }, 2000); // 2000 ms = 2 seconds
            };

            const cancelPress = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
            };

            element.addEventListener('touchstart', startPress, { passive: true });
            element.addEventListener('touchend', cancelPress);
            element.addEventListener('touchmove', cancelPress);

            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', cancelPress);
            element.addEventListener('mouseleave', cancelPress);

            element.addEventListener('contextmenu', (e) => {
                if (pressTimer) e.preventDefault();
            });
        }

        function openModal(item, currentKey) {
            activeEditSong = item;
            document.getElementById("modalSongName").textContent = `${item.title} - ${item.artist}`;
            document.getElementById("modalKeyInput").value = currentKey && currentKey !== 'N/A' ? currentKey : '';
            document.getElementById("editModal").style.display = "flex";
            document.getElementById("modalKeyInput").focus();
        }

        function closeModal() {
            document.getElementById("editModal").style.display = "none";
            activeEditSong = null;
        }

        async function submitKeyUpdate() {
            if (!activeEditSong) return;

            const newKey = document.getElementById("modalKeyInput").value.trim();
            const saveBtn = document.getElementById("saveBtn");
            
            saveBtn.disabled = true;
            saveBtn.textContent = "Saving...";

            try {
                const response = await fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        song: activeEditSong.title,
                        key: newKey || 'N/A'
                    })
                });

                const result = await response.json();

                if (result.status === "success") {
                    keyMapData[activeEditSong.title] = newKey;
                    renderUI();
                    closeModal();
                } else {
                    alert("Error updating key: " + result.message);
                }
            } catch (err) {
                console.error("Save failed:", err);
                alert("Network error. Key could not be saved to Google Sheets.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "Save";
            }
        }

        loadPlaylist();
    </script>

</body>
</html>
