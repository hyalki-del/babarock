<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Şarkı Seçici</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4500;
            --primary-hover: #e03d00;
            --card-bg: #121212;
            --surface: #1a1a1a;
            --border: #282828;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 69, 0, 0.15);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Navigation & Slider Tabs */
        .header {
            padding: 20px 20px 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-main);
        }

        .header h1 i { color: var(--primary); }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            background: #080808;
            padding: 5px;
            border-radius: 30px;
            border: 1px solid #222;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.4);
        }

        /* Viewport & Slider Track */
        .slider-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .slider-track {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-panel {
            width: 50%;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
        }

        /* Action Trigger Buttons */
        .trigger-btn {
            margin-top: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trigger-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* ==================== 1. REALISTIC SINGLE-REEL SLOT MACHINE ==================== */
        .slot-machine {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .slot-frame {
            background: linear-gradient(145deg, #1f1f1f, #080808);
            border: 4px solid #333;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9), 0 0 15px rgba(255,69,0,0.2);
            overflow: hidden;
            height: 120px;
            width: 260px;
            position: relative;
        }

        /* Curved 3D Cylinder Lighting (Red Line Removed) */
        .slot-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.8) 0%,
                rgba(0,0,0,0) 25%,
                rgba(0,0,0,0) 75%,
                rgba(0,0,0,0.8) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        .single-reel {
            width: 100%;
            height: 100%;
            background: #ffffff; /* White Spinner */
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
        }

        .reel-container {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            width: 100%;
            will-change: transform;
        }

        .reel-item {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 15px;
            border-bottom: 1px dashed #ccc;
        }

        .reel-item .title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #000000; /* Black Fonts */
            line-height: 1.2;
            word-break: break-word;
        }

        .reel-item .artist {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555555;
            margin-top: 4px;
        }

        /* Lever Mechanism */
        .arm-container {
            width: 30px;
            height: 120px;
            position: relative;
            cursor: pointer;
        }

        .arm-base {
            width: 20px;
            height: 20px;
            background: #444;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            left: 5px;
        }

        .arm-stick {
            width: 8px;
            height: 70px;
            background: linear-gradient(to right, #888, #fff, #666);
            position: absolute;
            bottom: 20px;
            left: 11px;
            transform-origin: bottom center;
            transition: transform 0.3s ease;
            border-radius: 4px;
        }

        .arm-knob {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ff6b35, #d32f2f);
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .arm-container.pulled .arm-stick {
            transform: rotateX(150deg) scaleY(0.6);
        }

        /* ==================== 2. WHEEL OF FORTUNE (POST-SPIN REVEAL LENS) ==================== */
        .wheel-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#wheelCanvas {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px var(--primary);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid var(--primary);
            z-index: 12;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        /* Frame lens: Reveals song ONLY when stopped */
        .wheel-magnifier {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 48px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(4px);
            border: 3px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
            z-index: 11;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .magnifier-text {
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 800;
            text-align: center;
            padding: 2px 6px;
            word-break: break-word;
            line-height: 1.1;
        }

        .wheel-center-cap {
            position: absolute;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle, #222 0%, #000 100%);
            border: 3px solid var(--primary);
            border-radius: 50%;
            z-index: 5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* YouTube Footer Link */
        .yt-container {
            padding: 0 20px 20px 20px;
        }

        .yt-btn {
            width: 100%;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .yt-btn i { color: #ff0000; }

        .yt-btn:hover:not(.disabled) {
            background: #282828;
            border-color: var(--primary);
        }

        .yt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fa-solid fa-guitar"></i> Baba Rock</h1>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchSlide(0)">
                    <i class="fa-solid fa-cubes"></i> Slot
                </button>
                <button class="tab-btn" onclick="switchSlide(1)">
                    <i class="fa-solid fa-dharmachakra"></i> Wheel
                </button>
            </div>
        </div>

        <!-- Slider Viewport -->
        <div class="slider-viewport" id="sliderViewport">
            <div class="slider-track" id="sliderTrack">
                
                <!-- PANEL 1: SINGLE-ROW REALISTIC SLOT MACHINE -->
                <div class="slide-panel">
                    <div class="slot-machine">
                        <div class="slot-frame">
                            <div class="single-reel">
                                <div class="reel-container" id="singleReel"></div>
                            </div>
                        </div>
                        <div class="arm-container" id="slotArm" onclick="pullSlotLever()">
                            <div class="arm-stick">
                                <div class="arm-knob"></div>
                            </div>
                            <div class="arm-base"></div>
                        </div>
                    </div>
                    <button class="trigger-btn" onclick="pullSlotLever()">
                        <i class="fa-solid fa-sliders"></i> PULL LEVER
                    </button>
                </div>

                <!-- PANEL 2: WHEEL OF FORTUNE -->
                <div class="slide-panel">
                    <div class="wheel-wrapper">
                        <div class="wheel-pointer"></div>
                        <!-- Red frame lens displays song ONLY upon stopping -->
                        <div class="wheel-magnifier">
                            <div class="magnifier-text" id="magnifierText">SPIN ME!</div>
                        </div>
                        <canvas id="wheelCanvas" width="260" height="260"></canvas>
                        <div class="wheel-center-cap" onclick="spinWheel()">SPIN</div>
                    </div>
                    <button class="trigger-btn" onclick="spinWheel()">
                        <i class="fa-solid fa-rotate-right"></i> SPIN WHEEL
                    </button>
                </div>

            </div>
        </div>

        <!-- YouTube Link Footer -->
        <div class="yt-container">
            <a href="#" target="_blank" rel="noopener noreferrer" class="yt-btn disabled" id="ytBtn">
                <i class="fa-brands fa-youtube"></i> Search on YouTube
            </a>
        </div>
    </div>

    <script>
        // Fallback playlist
        const defaultPlaylist = [
            { title: "Cambaz", artist: "mor ve ötesi" },
            { title: "Bir Derdim Var", artist: "mor ve ötesi" },
            { title: "Paramparça", artist: "Teoman" },
            { title: "Köprüaltı", artist: "duman" },
            { title: "Resimdeki Gözyaşları", artist: "Cem Karaca" },
            { title: "Islak Islak", artist: "Barış Akarsu" },
            { title: "Dönence", artist: "Barış Manço" },
            { title: "Araf", artist: "manga" }
        ];

        let playlist = [];
        let isBusy = false;
        let currentSlide = 0;

        // Wheel State
        let wheelAngle = 0;
        let wheelSpinning = false;

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                if (!res.ok) throw new Error("Local json fetch failed");
                playlist = await res.json();
            } catch (err) {
                playlist = defaultPlaylist;
            }
            initSlotMachine();
            drawWheel();
            setupTouchSwipe();
        }

        /* ================= NAVIGATION SLIDER ================= */
        function switchSlide(index) {
            if (isBusy) return;
            currentSlide = index;
            document.getElementById("sliderTrack").style.transform = `translateX(-${index * 50}%)`;
            
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
        }

        function setupTouchSwipe() {
            const viewport = document.getElementById('sliderViewport');
            let startX = 0;

            viewport.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
            viewport.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentSlide < 1) switchSlide(currentSlide + 1);
                    if (diff < 0 && currentSlide > 0) switchSlide(currentSlide - 1);
                }
            }, {passive: true});
        }

        /* ================= YOUTUBE LINK UPDATER ================= */
        function updateYouTubeBtn(song) {
            const ytBtn = document.getElementById("ytBtn");
            const query = encodeURIComponent(`${song.title} ${song.artist}`);
            ytBtn.href = `https://www.youtube.com/results?search_query=${query}`;
            ytBtn.classList.remove("disabled");
        }

        function getRandomSong() {
            return playlist[Math.floor(Math.random() * playlist.length)];
        }

        /* ================= 1. SLOT MACHINE (PHYSICS DECELERATION) ================= */
        function initSlotMachine() {
            const reel = document.getElementById('singleReel');
            // Duplicate the list enough times to allow smooth scrolling
            const displayList = [...playlist, ...playlist, ...playlist, ...playlist];
            reel.innerHTML = displayList.map(song => `
                <div class="reel-item">
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                </div>
            `).join('');
        }

        function pullSlotLever() {
            if (isBusy) return;
            isBusy = true;

            const arm = document.getElementById('slotArm');
            arm.classList.add('pulled');
            setTimeout(() => arm.classList.remove('pulled'), 400);

            const reel = document.getElementById('singleReel');
            const itemHeight = 100;
            const targetSong = getRandomSong();
            const targetIndex = playlist.findIndex(s => s.title === targetSong.title);
            
            // Calculate stopping point in 3rd loop iteration
            const stopIndex = playlist.length * 2 + (targetIndex >= 0 ? targetIndex : 0);
            const targetPos = stopIndex * itemHeight;

            let currentPos = 0;
            let velocity = 50; // Initial high speed
            const friction = 0.965; // Exponential deceleration factor

            function animateReel() {
                velocity *= friction;
                currentPos += velocity;

                // When velocity drops significantly, snap cleanly to target
                if (velocity < 1.5 || currentPos >= targetPos) {
                    reel.style.top = `-${targetPos}px`;
                    updateYouTubeBtn(targetSong);
                    isBusy = false;
                } else {
                    reel.style.top = `-${currentPos % (playlist.length * itemHeight * 3)}px`;
                    requestAnimationFrame(animateReel);
                }
            }

            requestAnimationFrame(animateReel);
        }

        /* ================= 2. WHEEL OF FORTUNE (REVEAL ON STOP) ================= */
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const totalSongs = playlist.length;
            if (totalSongs === 0) return;

            const sliceAngle = (2 * Math.PI) / totalSongs;
            ctx.clearRect(0, 0, 260, 260);

            for (let i = 0; i < totalSongs; i++) {
                const angle = wheelAngle + i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#ff4500' : '#1f1f1f';
                ctx.moveTo(130, 130);
                ctx.arc(130, 130, 125, angle, angle + sliceAngle);
                ctx.lineTo(130, 130);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(130, 130);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(playlist[i].title.substring(0, 12), 115, 3);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isBusy || wheelSpinning) return;
            isBusy = true;
            wheelSpinning = true;

            const magnifierText = document.getElementById('magnifierText');
            magnifierText.textContent = "???"; // Hide text while spinning

            let velocity = Math.random() * 0.25 + 0.35;
            const friction = 0.985;

            function animate() {
                velocity *= friction;
                wheelAngle += velocity;
                drawWheel();

                if (velocity > 0.0015) {
                    requestAnimationFrame(animate);
                } else {
                    wheelSpinning = false;
                    isBusy = false;

                    // Calculate winning song index at marker (12 o'clock = -PI/2)
                    const sliceAngle = (2 * Math.PI) / playlist.length;
                    let normalizedAngle = (Math.PI / 2 - (wheelAngle % (2 * Math.PI))) % (2 * Math.PI);
                    if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
                    
                    const finalIndex = Math.floor(normalizedAngle / sliceAngle) % playlist.length;
                    const selectedSong = playlist[finalIndex];

                    // Reveal ONLY once stopped
                    magnifierText.textContent = selectedSong.title;
                    updateYouTubeBtn(selectedSong);
                }
            }
            requestAnimationFrame(animate);
        }

        window.onload = init;
    </script>
</body>
</html>
