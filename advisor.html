<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Rock - Şarkı Seçici</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4500;
            --primary-hover: #e03d00;
            --card-bg: #121212;
            --surface: #1a1a1a;
            --border: #282828;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .layout-wrapper {
            display: flex;
            gap: 20px;
            max-width: 780px;
            width: 100%;
            align-items: flex-start;
        }

        .app-container {
            flex: 1;
            max-width: 440px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 69, 0, 0.15);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .played-panel {
            width: 280px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-height: 520px;
        }

        .played-panel h2 {
            font-size: 1.1rem;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .played-panel .hint-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .played-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .played-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .played-item:hover {
            border-color: var(--primary);
            background: #222;
        }

        .played-item .title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .played-item .artist {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .header {
            padding: 20px 20px 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-main);
        }

        .header h1 i { color: var(--primary); }

        .pool-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 600;
        }

        .pool-badge span {
            color: var(--primary);
            font-weight: 800;
        }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            background: #080808;
            padding: 5px;
            border-radius: 30px;
            border: 1px solid #222;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.4);
        }

        .slider-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .slider-track {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-panel {
            width: 50%;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
        }

        .trigger-btn {
            margin-top: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trigger-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .trigger-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .slot-machine {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .slot-frame {
            background: linear-gradient(145deg, #1f1f1f, #080808);
            border: 4px solid #333;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9), 0 0 15px rgba(255,69,0,0.2);
            overflow: hidden;
            height: 120px;
            width: 260px;
            position: relative;
        }

        .slot-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.8) 0%,
                rgba(0,0,0,0) 25%,
                rgba(0,0,0,0) 75%,
                rgba(0,0,0,0.8) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        .single-reel {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.3);
        }

        .reel-container {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            width: 100%;
            will-change: transform;
        }

        .reel-item {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 15px;
            border-bottom: 1px dashed #ccc;
        }

        .reel-item.interactive {
            cursor: pointer;
            z-index: 10;
        }

        .reel-item.interactive:hover .title {
            color: var(--primary);
            text-decoration: underline;
        }

        .reel-item .title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #000000;
            line-height: 1.2;
            word-break: break-word;
        }

        .reel-item .artist {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555555;
            margin-top: 4px;
        }

        .arm-container {
            width: 30px;
            height: 120px;
            position: relative;
            cursor: pointer;
        }

        .arm-base {
            width: 20px;
            height: 20px;
            background: #444;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            left: 5px;
        }

        .arm-stick {
            width: 8px;
            height: 70px;
            background: linear-gradient(to right, #888, #fff, #666);
            position: absolute;
            bottom: 20px;
            left: 11px;
            transform-origin: bottom center;
            transition: transform 0.3s ease;
            border-radius: 4px;
        }

        .arm-knob {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ff6b35, #d32f2f);
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .arm-container.pulled .arm-stick {
            transform: rotateX(150deg) scaleY(0.6);
        }

        .wheel-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#wheelCanvas {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px var(--primary);
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid var(--primary);
            z-index: 12;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .wheel-magnifier {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            background: rgba(18, 18, 18, 0.95);
            border: 3px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
            z-index: 15;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            animation: popup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .wheel-magnifier:hover {
            transform: translateX(-50%) scale(1.05);
            border-color: #ffffff;
        }

        @keyframes popup {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .magnifier-text {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 800;
            text-align: center;
            padding: 0 8px;
            word-break: break-word;
            line-height: 1.1;
        }

        .wheel-center-cap {
            position: absolute;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle, #222 0%, #000 100%);
            border: 3px solid var(--primary);
            border-radius: 50%;
            z-index: 5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .yt-container {
            padding: 0 20px 20px 20px;
        }

        .yt-btn {
            width: 100%;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .yt-btn i { color: #ff0000; }

        .yt-btn:hover:not(.disabled) {
            background: #282828;
            border-color: var(--primary);
        }

        .yt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .played-panel {
                width: 100%;
                max-width: 440px;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <!-- Main Application Box -->
        <div class="app-container">
            <div class="header">
                <h1><i class="fa-solid fa-guitar"></i> Baba Rock</h1>
                <div class="pool-badge">Kalan Havuz: <span id="poolCounter">0</span></div>
                <div class="nav-tabs">
                    <button class="tab-btn active" onclick="switchSlide(0)">
                        <i class="fa-solid fa-cubes"></i> Slot
                    </button>
                    <button class="tab-btn" onclick="switchSlide(1)">
                        <i class="fa-solid fa-dharmachakra"></i> Çark
                    </button>
                </div>
            </div>

            <!-- Slider Viewport -->
            <div class="slider-viewport" id="sliderViewport">
                <div class="slider-track" id="sliderTrack">
                    
                    <!-- PANEL 1: SLOT MACHINE -->
                    <div class="slide-panel">
                        <div class="slot-machine">
                            <div class="slot-frame">
                                <div class="single-reel">
                                    <div class="reel-container" id="singleReel"></div>
                                </div>
                            </div>
                            <div class="arm-container" id="slotArm" onclick="pullSlotLever()">
                                <div class="arm-stick">
                                    <div class="arm-knob"></div>
                                </div>
                                <div class="arm-base"></div>
                            </div>
                        </div>
                        <button class="trigger-btn" id="slotBtn" onclick="pullSlotLever()">
                            <i class="fa-solid fa-sliders"></i> KOLU ÇEK
                        </button>
                    </div>

                    <!-- PANEL 2: WHEEL OF FORTUNE -->
                    <div class="slide-panel">
                        <div class="wheel-wrapper">
                            <div class="wheel-pointer"></div>
                            <div class="wheel-magnifier" id="wheelMagnifier" onclick="handleLyricsFetch(selectedSong)">
                                <div class="magnifier-text" id="magnifierText"></div>
                            </div>
                            <canvas id="wheelCanvas" width="260" height="260"></canvas>
                            <div class="wheel-center-cap" onclick="spinWheel()">ÇEVİR</div>
                        </div>
                        <button class="trigger-btn" id="wheelBtn" onclick="spinWheel()">
                            <i class="fa-solid fa-rotate-right"></i> ÇARKI ÇEVİR
                        </button>
                    </div>

                </div>
            </div>

            <!-- YouTube Link Footer -->
            <div class="yt-container">
                <a href="#" target="_blank" rel="noopener noreferrer" class="yt-btn disabled" id="ytBtn">
                    <i class="fa-brands fa-youtube"></i> YouTube'da Ara
                </a>
            </div>
        </div>

        <!-- Right Side Panel: Played Songs List -->
        <div class="played-panel">
            <h2><i class="fa-solid fa-list-check"></i> Çalınan Şarkılar</h2>
            <div class="hint-text">
                <i class="fa-solid fa-circle-info"></i> Sözler için tıklayın.<br>
                Havuza döndürmek için çift tıklayın.
            </div>
            <ul class="played-list" id="playedList"></ul>
        </div>
    </div>

    <script>
        const defaultPlaylist = [
            { title: "Cambaz", artist: "mor ve ötesi" },
            { title: "Bir Derdim Var", artist: "mor ve ötesi" },
            { title: "Paramparça", artist: "Teoman" },
            { title: "Köprüaltı", artist: "duman" },
            { title: "Resimdeki Gözyaşları", artist: "Cem Karaca" },
            { title: "Islak Islak", artist: "Barış Akarsu" },
            { title: "Dönence", artist: "Barış Manço" },
            { title: "Araf", artist: "manga" }
        ];

        let playlist = [];          // Active pool
        let playedList = [];         // Extracted pool (Most recent on top)
        let isBusy = false;
        let currentSlide = 0;
        let selectedSong = null;

        let wheelAngle = 0;
        let wheelSpinning = false;
        let clickTimer = null;

        async function init() {
            try {
                const res = await fetch("./playlist.json");
                if (!res.ok) throw new Error("Local json fetch failed");
                playlist = await res.json();
            } catch (err) {
                playlist = [...defaultPlaylist];
            }
            updatePoolCounter();
            initSlotMachine();
            drawWheel();
            setupTouchSwipe();
        }

        function updatePoolCounter() {
            document.getElementById('poolCounter').textContent = playlist.length;
        }

        function switchSlide(index) {
            if (isBusy) return;
            currentSlide = index;
            document.getElementById("sliderTrack").style.transform = `translateX(-${index * 50}%)`;
            
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
        }

        function setupTouchSwipe() {
            const viewport = document.getElementById('sliderViewport');
            let startX = 0;

            viewport.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
            viewport.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentSlide < 1) switchSlide(currentSlide + 1);
                    if (diff < 0 && currentSlide > 0) switchSlide(currentSlide - 1);
                }
            }, {passive: true});
        }

        /* ================= POOL MANAGEMENT & PLAYED LIST UI ================= */
        function extractSong(song) {
            const index = playlist.findIndex(s => s.title === song.title && s.artist === song.artist);
            if (index !== -1) {
                playlist.splice(index, 1);
                playedList.unshift(song); // Prepend so last picked is on top
                renderPlayedList();
                updatePoolCounter();
            }
        }

        function returnSongToPool(song) {
            const index = playedList.findIndex(s => s.title === song.title && s.artist === song.artist);
            if (index !== -1) {
                playedList.splice(index, 1);
                playlist.push(song);
                renderPlayedList();
                updatePoolCounter();
                refreshGameViews();
            }
        }

        function renderPlayedList() {
            const container = document.getElementById('playedList');
            container.innerHTML = playedList.map((song, i) => `
                <li class="played-item" onclick="onPlayedItemClick(event, ${i})" ondblclick="onPlayedItemDblClick(event, ${i})">
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                </li>
            `).join('');
        }

        function onPlayedItemClick(e, index) {
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                const song = playedList[index];
                if (song) handleLyricsFetch(song);
            }, 250);
        }

        function onPlayedItemDblClick(e, index) {
            clearTimeout(clickTimer);
            const song = playedList[index];
            if (song) returnSongToPool(song);
        }

        function refreshGameViews() {
            initSlotMachine();
            drawWheel();

            const slotBtn = document.getElementById('slotBtn');
            const wheelBtn = document.getElementById('wheelBtn');
            const empty = playlist.length === 0;

            slotBtn.disabled = empty;
            wheelBtn.disabled = empty;

            if (empty) {
                document.getElementById('magnifierText').textContent = "HAVUZ BOŞ";
            }
        }

        /* ================= LYRIC FETCHING ENGINE ================= */
        function sanitizeSegment(str) {
            const map = {
                'ç':'c', 'Ç':'C', 'ğ':'g', 'Ğ':'G', 'ı':'i', 'İ':'I',
                'ö':'o', 'Ö':'O', 'ş':'s', 'Ş':'S', 'ü':'u', 'Ü':'U'
            };
            const mapped = str.replace(/[çÇğĞıİöÖşŞüÜ]/g, match => map[match] || match);
            return mapped
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }

        async function handleLyricsFetch(song) {
            if (!song) return;

            const cleanArtist = sanitizeSegment(song.artist);
            const cleanTitle = sanitizeSegment(song.title);
            const lyricFileName = `${cleanArtist}-${cleanTitle}.txt`;
            const lyricPath = `./songs/${lyricFileName}`;

            let lyricsContent = "";

            try {
                const res = await fetch(lyricPath);
                if (!res.ok) throw new Error(`File not found: ${lyricPath}`);
                lyricsContent = await res.text();
            } catch (err) {
                lyricsContent = `Şarkı sözü dosyası bulunamadı: "${song.artist} - ${song.title}".\n\nBeklenen Dosya Yolu:\n${lyricPath}`;
            }

            const lyricsWin = window.open("", "_blank");
            if (lyricsWin) {
                lyricsWin.document.write(`
                    <!DOCTYPE html>
                    <html lang="tr">
                    <head>
                        <meta charset="UTF-8">
                        <title>${song.artist} - ${song.title} (Şarkı Sözleri)</title>
                        <style>
                            body {
                                background-color: #000000;
                                color: #ffffff;
                                font-family: 'Courier New', Courier, monospace;
                                font-size: 2em;
                                padding: 40px;
                                margin: 0;
                                line-height: 1.5;
                                white-space: pre-wrap;
                                word-break: break-word;
                            }
                        </style>
                    </head>
                    <body>${lyricsContent}</body>
                    </html>
                `);
                lyricsWin.document.close();
            }
        }

        function updateYouTubeBtn(song) {
            const ytBtn = document.getElementById("ytBtn");
            if (!song) {
                ytBtn.classList.add("disabled");
                return;
            }
            const query = encodeURIComponent(`${song.title} ${song.artist}`);
            ytBtn.href = `https://www.youtube.com/results?search_query=${query}`;
            ytBtn.classList.remove("disabled");
        }

        function getRandomSong() {
            if (playlist.length === 0) return null;
            return playlist[Math.floor(Math.random() * playlist.length)];
        }

        /* ================= SLOT MACHINE ================= */
        function initSlotMachine() {
            const reel = document.getElementById('singleReel');
            if (playlist.length === 0) {
                reel.innerHTML = `<div class="reel-item"><div class="title">ŞARKI YOK</div></div>`;
                reel.style.top = '0px';
                return;
            }
            const displayList = [...playlist, ...playlist, ...playlist, ...playlist];
            reel.innerHTML = displayList.map((song, i) => `
                <div class="reel-item" id="reel-item-${i}">
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                </div>
            `).join('');
        }

        function pullSlotLever() {
            if (isBusy || playlist.length === 0) return;

            isBusy = true;

            document.querySelectorAll('.reel-item').forEach(el => {
                el.classList.remove('interactive');
                el.onclick = null;
            });

            const arm = document.getElementById('slotArm');
            arm.classList.add('pulled');
            setTimeout(() => arm.classList.remove('pulled'), 400);

            const reel = document.getElementById('singleReel');
            const itemHeight = 100;
            selectedSong = getRandomSong();
            const targetIndex = playlist.findIndex(s => s.title === selectedSong.title && s.artist === selectedSong.artist);
            
            const stopIndex = playlist.length * 2 + (targetIndex >= 0 ? targetIndex : 0);
            const targetPos = stopIndex * itemHeight;

            let currentPos = 0;
            let velocity = 50;
            const friction = 0.965;

            function animateReel() {
                velocity *= friction;
                currentPos += velocity;

                if (velocity < 1.5 || currentPos >= targetPos) {
                    reel.style.top = `-${targetPos}px`;
                    
                    const finalItem = document.getElementById(`reel-item-${stopIndex}`);
                    if (finalItem) {
                        finalItem.classList.add('interactive');
                        finalItem.onclick = () => handleLyricsFetch(selectedSong);
                    }

                    extractSong(selectedSong);
                    updateYouTubeBtn(selectedSong);
                    isBusy = false;
                    refreshGameViews();
                } else {
                    reel.style.top = `-${currentPos % (playlist.length * itemHeight * 3)}px`;
                    requestAnimationFrame(animateReel);
                }
            }

            requestAnimationFrame(animateReel);
        }

        /* ================= WHEEL OF FORTUNE ================= */
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const totalSongs = playlist.length;
            ctx.clearRect(0, 0, 260, 260);

            if (totalSongs === 0) {
                ctx.beginPath();
                ctx.fillStyle = '#222222';
                ctx.arc(130, 130, 125, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText("HAVUZ BOŞ", 130, 135);
                return;
            }

            const sliceAngle = (2 * Math.PI) / totalSongs;

            for (let i = 0; i < totalSongs; i++) {
                const angle = wheelAngle + i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#ff4500' : '#1f1f1f';
                ctx.moveTo(130, 130);
                ctx.arc(130, 130, 125, angle, angle + sliceAngle);
                ctx.lineTo(130, 130);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(130, 130);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(playlist[i].title.substring(0, 12), 115, 3);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isBusy || wheelSpinning || playlist.length === 0) return;

            isBusy = true;
            wheelSpinning = true;

            const magnifier = document.getElementById('wheelMagnifier');
            magnifier.style.display = 'none';

            let velocity = Math.random() * 0.25 + 0.35;
            const friction = 0.985;

            function animate() {
                velocity *= friction;
                wheelAngle += velocity;
                drawWheel();

                if (velocity > 0.0015) {
                    requestAnimationFrame(animate);
                } else {
                    wheelSpinning = false;
                    isBusy = false;

                    const sliceAngle = (2 * Math.PI) / playlist.length;
                    let currentRotation = wheelAngle % (2 * Math.PI);
                    if (currentRotation < 0) currentRotation += 2 * Math.PI;

                    let relativePointerAngle = (3 * Math.PI / 2 - currentRotation) % (2 * Math.PI);
                    if (relativePointerAngle < 0) relativePointerAngle += 2 * Math.PI;

                    const selectedIndex = Math.floor(relativePointerAngle / sliceAngle) % playlist.length;
                    selectedSong = playlist[selectedIndex];

                    document.getElementById('magnifierText').textContent = selectedSong.title;
                    magnifier.style.display = 'flex';

                    extractSong(selectedSong);
                    updateYouTubeBtn(selectedSong);
                    refreshGameViews();
                }
            }
            requestAnimationFrame(animate);
        }

        window.onload = init;
    </script>
</body>
