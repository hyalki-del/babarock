<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABAROCK TAKVIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .apple-card { background-color: #1c1c1e; border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-[#f5f5f7] p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="apple-card rounded-2xl p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 shadow-sm">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-white">BABAROCK TAKVIM</h1>
                <p class="text-[#86868b] text-sm mt-1">Meşgul olduğunuz günleri seçin. Kaydedilmesi için "Kaydet ve Güncelle" butonuna basın.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-[#86868b]">Kullanıcı:</span>
                    <select id="userSelect" class="bg-[#2c2c2e] border border-white/10 rounded-xl px-4 py-2.5 text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                        <option value="serkan">SERKAN</option>
                        <option value="ilker">ILKER</option>
                        <option value="hasan">HASAN</option>
                        <option value="osman">OSMAN</option>
                        <option value="oguzhan">OGUZHAN</option>
                    </select>
                </div>
                <button id="saveBtn" class="bg-[#0071e3] hover:bg-[#0077ed] text-white text-sm px-5 py-2.5 rounded-xl font-medium tracking-wide transition-all shadow-md flex items-center gap-2">
                    Kaydet ve Güncelle
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <main class="lg:col-span-3 apple-card rounded-2xl p-6 shadow-xl relative">
                <div id="loadingOverlay" class="absolute inset-0 rounded-2xl bg-black/80 flex flex-col items-center justify-center font-medium text-[#0071e3] z-50 gap-2">
                    <div class="animate-spin rounded-full h-8 w-8 border-2 border-[#0071e3] border-t-transparent"></div>
                    <span id="loadingText" class="text-sm text-[#86868b] mt-2">Veriler senkronize ediliyor...</span>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <button id="prevMonth" class="bg-[#2c2c2e] hover:bg-[#3a3a3c] p-2.5 rounded-xl text-white transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <h2 id="currentMonthYear" class="text-lg font-semibold tracking-wide text-white">Temmuz 2026</h2>
                    <button id="nextMonth" class="bg-[#2c2c2e] hover:bg-[#3a3a3c] p-2.5 rounded-xl text-white transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>

                <div class="grid grid-cols-7 text-center text-xs font-medium text-[#86868b] uppercase tracking-wider mb-4">
                    <div>Pzt</div><div>Sal</div><div>Çar</div><div>Per</div><div>Cum</div><div>Cmt</div><div>Paz</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
            </main>

            <aside class="space-y-4">
                <div class="apple-card rounded-2xl p-5 shadow-xl">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-[#86868b] mb-4">Liderlik Tablosu</h3>
                    <div id="rosterList" class="space-y-3"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // KENDİ LİNKİNİZİ AŞAĞIYA YAPIŞTIRIN
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxCDuxGmC8qh20F1MAErwd8fBCloXXSkDJYxLxlvna_z8fNmaTsc3haJAkz_Pmk2qdR/exec";

        const membersInfo = {
            serkan: { name: 'Serkan', color: 'bg-[#ff3b30]' },
            ilker: { name: 'İlker', color: 'bg-[#0071e3]' },
            hasan: { name: 'Hasan', color: 'bg-[#34c759]' },
            osman: { name: 'Osman', color: 'bg-[#ff9500]' },
            oguzhan: { name: 'Oğuzhan', color: 'bg-[#af52de]' }
        };

        let serverData = { serkan: [], ilker: [], hasan: [], osman: [], oguzhan: [] };
        let localChanges = { serkan: [], ilker: [], hasan: [], osman: [], oguzhan: [] };
        let currentUser = 'serkan';
        let currentDate = new Date(2026, 6, 1);

        const userSelect = document.getElementById('userSelect');
        const saveBtn = document.getElementById('saveBtn');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');

        userSelect.addEventListener('change', (e) => { currentUser = e.target.value; render(); });
        prevMonthBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); render(); });
        nextMonthBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); render(); });
        saveBtn.addEventListener('click', pushToDatabase);

        function fixDateFormat(dStr) {
            if (!dStr) return "";
            let clean = String(dStr).trim();
            if (clean.includes(" ") && clean.length > 10) {
                try {
                    let d = new Date(clean);
                    if (!isNaN(d.getTime())) {
                        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    }
                } catch(e){}
            }
            if (clean.includes(".")) {
                let p = clean.split(".");
                if (p.length === 3) return `${p[2]}-${String(p[1]).padStart(2, '0')}-${String(p[0]).padStart(2, '0')}`;
            }
            if (clean.includes("-")) {
                let p = clean.split("-");
                if (p.length === 3) return `${p[0]}-${String(p[1]).padStart(2, '0')}-${String(p[2]).padStart(2, '0')}`;
            }
            return clean;
        }

        // Kilitlenme sorununu çözen akıllı veri çekme metodu (POST üzerinden OKUMA)
        async function fetchDatabase() {
            showLoading("Güncel veriler yükleniyor...");
            try {
                const res = await fetch(DATABASE_URL + "?action=read", { method: 'GET', redirect: 'follow' });
                const data = await res.json();
                Object.keys(serverData).forEach(k => { 
                    serverData[k] = (data[k] || []).map(d => fixDateFormat(d)).filter(Boolean); 
                });
                localChanges = JSON.parse(JSON.stringify(serverData));
            } catch (e) { 
                console.error(e);
                // Eğer GET yine de engellenirse boş şablonla açılması için kilidi açıyoruz
            }
            hideLoading();
            render();
        }

        async function pushToDatabase() {
            showLoading("Değişiklikler kaydediliyor...");
            try {
                await fetch(DATABASE_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    body: JSON.stringify({ name: currentUser, busyDates: localChanges[currentUser] })
                });
                await fetchDatabase();
                alert("Tebrikler! Başarıyla güncellendi.");
            } catch (e) { 
                console.error(e);
                alert("Kayıt sırasında bir HATA oluştu."); 
            }
            hideLoading();
        }

        function toggleDate(dateStr) {
            const list = localChanges[currentUser];
            const idx = list.indexOf(dateStr);
            if (idx > -1) list.splice(idx, 1);
            else list.push(dateStr);
            render();
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            document.getElementById('currentMonthYear').innerText = `${monthNames[month]} ${year}`;

            const dayOfWeek = new Date(year, month, 1).getDay();
            const firstDayIndex = (dayOfWeek === 0) ? 6 : dayOfWeek - 1;
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'bg-transparent min-h-[75px]';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateTarget = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const busyMembers = Object.keys(localChanges).filter(k => localChanges[k].includes(dateTarget));
                const isCurrentBusy = localChanges[currentUser].includes(dateTarget);
                const isFree = busyMembers.length === 0;

                const btn = document.createElement('button');
                btn.className = `min-h-[80px] flex flex-col justify-between p-2.5 rounded-xl border text-left transition-all duration-200 ${
                    isCurrentBusy 
                    ? 'border-[#ff3b30]/40 bg-[#ff3b30]/10 hover:bg-[#ff3b30]/15' 
                    : isFree 
                    ? 'border-transparent bg-[#1c1c1e] hover:bg-[#2c2c2e]' 
                    : 'border-transparent bg-[#2c2c2e] hover:bg-[#3a3a3c]'
                }`;
                btn.onclick = () => toggleDate(dateTarget);

                btn.innerHTML = `
                    <span class="text-sm font-semibold ${isFree ? 'text-[#34c759]' : 'text-gray-400'}">${day}</span>
                    <div class="flex flex-wrap gap-1 mt-2">
                        ${busyMembers.map(k => `<span class="text-[9px] px-1.5 py-0.5 rounded-md font-bold text-white uppercase ${membersInfo[k].color}">${membersInfo[k].name[0]}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(btn);
            }

            const roster = document.getElementById('rosterList');

const sortedMembers = Object.keys(localChanges).sort((a, b) => {
    return localChanges[b].length - localChanges[a].length;
});

roster.innerHTML = sortedMembers.map(k => `
    <div class="flex items-center justify-between text-xs bg-[#2c2c2e]/50 p-3 rounded-xl border border-white/5">
        <div class="flex items-center gap-2.5">
            <span class="h-2 w-2 rounded-full ${membersInfo[k].color}"></span>
            <span class="font-medium text-[#f5f5f7]">${membersInfo[k].name}</span>
        </div>
        <span class="font-mono text-[#86868b] bg-black/40 px-2 py-0.5 rounded-md">${localChanges[k].length} meşgul gün</span>
    </div>
`).join('');
            
            const hasChanges = JSON.stringify(serverData[currentUser]) !== JSON.stringify(localChanges[currentUser]);
            if(hasChanges) {
                saveBtn.className = "bg-[#34c759] hover:bg-[#30b753] text-white text-sm px-5 py-2.5 rounded-xl font-medium tracking-wide transition-all shadow-md flex items-center gap-2 scale-[1.02]";
                saveBtn.innerText = "Değişiklikleri Kaydet";
            } else {
                saveBtn.className = "bg-[#0071e3] hover:bg-[#0077ed] text-white text-sm px-5 py-2.5 rounded-xl font-medium tracking-wide transition-all shadow-md flex items-center gap-2";
                saveBtn.innerText = "Kaydet ve Güncelle";
            }
        }

        fetchDatabase();
    </script>
</body>
</html>
